<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — The Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/archive.css">
  <style>
    :root {
      --bg: #080706;
      --bg-2: #0F0D0B;
      --bg-card: #161412;
      --bg-elevated: #1E1B17;
      --gold: #C8A84B;
      --gold-bright: #E8C96E;
      --gold-dim: #7A6530;
      --text: #F0E6D3;
      --text-2: #B8A898;
      --text-3: #6B5E50;
      --serif: 'Cormorant Garamond', serif;
      --sans: 'DM Sans', sans-serif;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--sans); }

    .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .chip {
      padding: 6px 16px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid rgba(200,168,75,0.2);
      color: var(--text-3);
      background: var(--bg-card);
      transition: all 0.18s;
    }
    .chip.active { background: var(--gold); border-color: var(--gold); color: var(--bg); }
    .chip:hover:not(.active) { border-color: rgba(200,168,75,0.5); color: var(--gold); }

    .notif-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid rgba(200,168,75,0.1);
      border-radius: var(--radius-lg, 12px);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
      border-left: 4px solid transparent;
    }
    .notif-item.unread { background: var(--bg-elevated); border-left-color: var(--gold); }
    .notif-item.unread.type-message { border-left-color: rgba(200,168,75,0.6); }
    .notif-item.unread.type-masterclass { border-left-color: var(--gold-bright); }
    .notif-item:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.4); transform: translateY(-1px); border-color: rgba(200,168,75,0.3); }

    .notif-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .notif-icon.grade { background: rgba(200,168,75,0.12); color: var(--gold); }
    .notif-icon.message { background: rgba(200,168,75,0.08); color: var(--gold-bright); }
    .notif-icon.masterclass { background: rgba(232,201,110,0.12); color: var(--gold-bright); }
    .notif-icon.system { background: rgba(255,255,255,0.04); color: var(--text-3); }

    .notif-title { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 3px; }
    .notif-body { font-size: 13px; color: var(--text-2); line-height: 1.5; }
    .notif-time { font-size: 11px; color: var(--text-3); margin-top: 6px; }
    .notif-unread-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .notif-delete { padding: 6px; color: var(--text-3); border-radius: 6px; transition: all 0.15s; opacity: 0; flex-shrink: 0; background: none; border: none; cursor: pointer; }
    .notif-item:hover .notif-delete { opacity: 1; }
    .notif-delete:hover { background: rgba(200,168,75,0.1); color: var(--gold); }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .empty-notif { text-align: center; padding: 80px 40px; }
    .empty-notif-icon { margin: 0 auto 20px; }
  </style>
</head>
<body>
<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-title">The Archive</div>
      <div class="brand-sub" id="sb-portal">Student Portal</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/student-dashboard.html" class="nav-item" id="nav-dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </a>
      <a href="/course-catalog.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        My Courses
      </a>
      <a href="/gradebook.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Gradebook
      </a>
      <a href="/messaging.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Messages
      </a>
      <a href="/notifications.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Notifications
      </a>
      <a href="/student-profile.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </a>
      <a href="/sheet-music.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Sheet Music
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="handleLogout()">
        <div class="sidebar-avatar" id="sb-avatar">—</div>
        <div class="sidebar-user-info">
          <div class="user-name" id="sb-name">Loading…</div>
          <div class="user-role" id="sb-role">student</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title">Notifications</div>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="markAllRead()" title="Mark all read" style="width:auto;border-radius:var(--radius);padding:8px 14px;font-size:12px;font-weight:600;color:var(--gold);">Mark all read</button>
        <div class="topbar-avatar" id="topbar-avatar">—</div>
      </div>
    </header>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Notifications</h1>
        </div>
      </div>
      <div class="filter-chips">
        <div class="chip active" onclick="setFilter('all', this)">All</div>
        <div class="chip" onclick="setFilter('unread', this)">Unread</div>
        <div class="chip" onclick="setFilter('grade', this)">Grades</div>
        <div class="chip" onclick="setFilter('message', this)">Messages</div>
        <div class="chip" onclick="setFilter('masterclass', this)">Masterclasses</div>
      </div>
      <div id="notif-list">
        <div class="card skeleton" style="height:80px;margin-bottom:8px;"></div>
        <div class="card skeleton" style="height:80px;margin-bottom:8px;"></div>
        <div class="card skeleton" style="height:80px;margin-bottom:8px;"></div>
      </div>
    </main>
  </div>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth-guard.js"></script>
<script>
  let allNotifications = [];
  let activeFilter = 'all';

  function handleLogout() {
    localStorage.removeItem('archive_token');
    localStorage.removeItem('archive_user');
    window.location.href = '/index.html';
  }

  function relativeTime(str) {
    if (!str) return '';
    const diff = Date.now() - new Date(str).getTime();
    const secs = Math.floor(diff / 1000);
    if (secs < 60) return 'just now';
    const mins = Math.floor(secs / 60);
    if (mins < 60) return `${mins} minute${mins !== 1 ? 's' : ''} ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs} hour${hrs !== 1 ? 's' : ''} ago`;
    const days = Math.floor(hrs / 24);
    return `${days} day${days !== 1 ? 's' : ''} ago`;
  }

  function typeIcon(type) {
    if (type === 'grade') return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>`;
    if (type === 'message') return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
    if (type === 'masterclass') return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
    return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
  }

  function getTypeClass(type) {
    if (type === 'grade') return 'grade';
    if (type === 'message') return 'message';
    if (type === 'masterclass') return 'masterclass';
    return 'system';
  }

  function setFilter(filter, el) {
    activeFilter = filter;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderNotifications();
  }

  function renderNotifications() {
    let items = allNotifications;
    if (activeFilter === 'unread') items = items.filter(n => !n.read);
    else if (activeFilter !== 'all') items = items.filter(n => n.type === activeFilter);

    const container = document.getElementById('notif-list');
    if (!items.length) {
      container.innerHTML = `
        <div class="empty-notif">
          <div class="empty-notif-icon">
            <svg width="80" height="80" viewBox="0 0 100 100" fill="none">
              <circle cx="50" cy="50" r="48" fill="rgba(200,168,75,0.05)" stroke="rgba(200,168,75,0.15)" stroke-width="2"/>
              <path d="M35 45a15 15 0 0 1 30 0c0 15-6 20-6 20H41s-6-5-6-20z" stroke="var(--gold)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M46 65a4 4 0 0 0 8 0" stroke="var(--gold)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
              <line x1="42" y1="38" x2="58" y2="38" stroke="var(--gold-bright)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <h3 style="font-family:var(--serif);font-style:italic;font-size:22px;color:var(--text);margin-bottom:8px;">You're all caught up.</h3>
          <p style="font-size:13px;color:var(--text-3);">${activeFilter === 'unread' ? 'No unread notifications.' : 'No notifications to show.'}</p>
        </div>
      `;
      return;
    }
    container.innerHTML = items.map(n => `
      <div class="notif-item section-block ${!n.read ? 'unread' : ''} type-${n.type || 'system'}" onclick="handleNotifClick(${n.id}, '${n.link || ''}')">
        <div class="notif-icon ${getTypeClass(n.type)}">${typeIcon(n.type)}</div>
        <div style="flex:1;min-width:0;">
          <div class="notif-title">${n.title}</div>
          ${n.body ? `<div class="notif-body">${n.body}</div>` : ''}
          <div class="notif-time">${relativeTime(n.created_at)}</div>
        </div>
        ${!n.read ? '<div class="notif-unread-dot"></div>' : ''}
        <button class="notif-delete" onclick="event.stopPropagation(); deleteNotif(${n.id})" title="Delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    `).join('');
  }

  async function handleNotifClick(id, link) {
    try { await api.post(`/api/notifications/${id}/read`, {}); } catch {}
    const n = allNotifications.find(x => x.id === id);
    if (n) n.read = 1;
    renderNotifications();
    if (link) window.location.href = link;
  }

  async function deleteNotif(id) {
    try {
      await api.del(`/api/notifications/${id}`);
      allNotifications = allNotifications.filter(n => n.id !== id);
      renderNotifications();
    } catch (err) {
      console.error(err);
    }
  }

  async function markAllRead() {
    try {
      await api.post('/api/notifications/read-all', {});
      allNotifications.forEach(n => n.read = 1);
      renderNotifications();
    } catch {}
  }

  async function loadNotifications() {
    try {
      const data = await api.get('/api/notifications');
      allNotifications = data.notifications || [];
      renderNotifications();
    } catch {
      document.getElementById('notif-list').innerHTML = '<div class="card card-sm"><p style="color:var(--text-3);font-size:13px;">Could not load notifications.</p></div>';
    }
  }

  document.addEventListener('userLoaded', (e) => {
    const user = e.detail;
    const initials = user.avatar_initials || (user.first_name[0] + user.last_name[0]);
    document.getElementById('sb-avatar').textContent = initials;
    document.getElementById('topbar-avatar').textContent = initials;
    document.getElementById('sb-name').textContent = `${user.first_name} ${user.last_name}`;
    document.getElementById('sb-role').textContent = user.role;
    if (user.role === 'instructor') {
      document.getElementById('sb-portal').textContent = 'Instructor Portal';
      document.getElementById('nav-dashboard').href = '/instructor-dashboard.html';
    }
    loadNotifications();
    setInterval(loadNotifications, 30000);
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
  gsap.registerPlugin(ScrollTrigger);
  gsap.from('.page-header, .stat-card, .content-card', {
    y: 24, opacity: 0, duration: 0.65, stagger: 0.07, ease: 'power3.out', delay: 0.1
  });
  gsap.utils.toArray('.section-block, .card-row, tr').forEach(el => {
    gsap.from(el, { scrollTrigger: { trigger: el, start: 'top 88%' },
      y: 16, opacity: 0, duration: 0.5, ease: 'power2.out' });
  });
</script>
</body>
</html>
