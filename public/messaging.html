<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — The Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/archive.css">
  <style>
    :root {
      --bg: #080706;
      --bg-2: #0F0D0B;
      --bg-card: #161412;
      --bg-elevated: #1E1B17;
      --gold: #C8A84B;
      --gold-bright: #E8C96E;
      --gold-dim: #7A6530;
      --text: #F0E6D3;
      --text-2: #B8A898;
      --text-3: #6B5E50;
      --serif: 'Cormorant Garamond', serif;
      --sans: 'DM Sans', sans-serif;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--sans); }

    .msg-layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - var(--topbar-height, 60px)); overflow: hidden; }

    /* Thread panel */
    .thread-panel { background: var(--bg-card); border-right: 1px solid rgba(200,168,75,0.12); display: flex; flex-direction: column; overflow: hidden; }
    .thread-panel-head { padding: 16px; border-bottom: 1px solid rgba(200,168,75,0.12); flex-shrink: 0; }
    .thread-search { display: flex; align-items: center; gap: 8px; background: var(--bg-2); border: 1px solid rgba(200,168,75,0.15); border-radius: var(--radius, 8px); padding: 8px 12px; margin-bottom: 10px; transition: box-shadow 0.2s; }
    .thread-search:focus-within { box-shadow: 0 0 0 3px rgba(200,168,75,0.15); }
    .thread-search input { background: none; border: none; outline: none; font-size: 13px; color: var(--text); width: 100%; font-family: var(--sans); }
    .thread-search input::placeholder { color: var(--text-3); }
    .thread-search svg { color: var(--text-3); flex-shrink: 0; }
    .thread-list { flex: 1; overflow-y: auto; }
    .thread-item { display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px; cursor: pointer; border-bottom: 1px solid rgba(200,168,75,0.06); transition: background 0.15s; }
    .thread-item:hover { background: var(--bg-elevated); }
    .thread-item.active { background: rgba(200,168,75,0.07); border-left: 3px solid var(--gold); padding-left: 13px; }
    .thread-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gold-dim); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: var(--text); flex-shrink: 0; }
    .thread-info { flex: 1; min-width: 0; }
    .thread-subject { font-weight: 600; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thread-preview { font-size: 12px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .thread-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .thread-time { font-size: 11px; color: var(--text-3); }
    .unread-badge { background: var(--gold); color: var(--bg); border-radius: 99px; padding: 2px 7px; font-size: 11px; font-weight: 700; }

    /* Detail panel */
    .detail-panel { display: flex; flex-direction: column; overflow: hidden; background: var(--bg-2); }
    .detail-header { background: var(--bg-card); border-bottom: 1px solid rgba(200,168,75,0.12); padding: 14px 20px; flex-shrink: 0; }
    .detail-subject { font-family: var(--serif); font-style: italic; font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .participant-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .participant-chip { display: flex; align-items: center; gap: 6px; background: var(--bg-elevated); border: 1px solid rgba(200,168,75,0.12); border-radius: 99px; padding: 4px 10px; font-size: 12px; color: var(--text-2); }
    .participant-chip-avatar { width: 20px; height: 20px; border-radius: 50%; background: var(--gold-dim); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--text); }

    /* Message feed */
    .message-feed { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg-bubble-wrap { display: flex; align-items: flex-end; gap: 8px; }
    .msg-bubble-wrap.own { flex-direction: row-reverse; }
    .msg-sender-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold-dim); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text); flex-shrink: 0; }

    /* Chat bubbles: sent = gold-tinted dark, received = plain dark card */
    .msg-bubble { max-width: 65%; border-radius: 16px; padding: 10px 14px; position: relative; }
    .msg-bubble.mine { background: rgba(200,168,75,0.15); border: 1px solid rgba(200,168,75,0.25); color: var(--text); border-bottom-right-radius: 4px; }
    .msg-bubble.theirs { background: var(--bg-card); border: 1px solid rgba(200,168,75,0.1); color: var(--text); border-bottom-left-radius: 4px; }
    .msg-bubble.mine .msg-sender-name { color: var(--gold); }
    .msg-sender-name { font-size: 11px; font-weight: 600; margin-bottom: 4px; opacity: 0.85; }
    .msg-text { font-size: 14px; line-height: 1.5; }
    .msg-time { font-size: 10px; margin-top: 4px; color: var(--text-3); }
    .msg-attach { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; margin-top: 6px; color: var(--gold); text-decoration: underline; }

    /* Message slide-in animation */
    @keyframes msgSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-bubble-wrap { animation: msgSlideIn 0.28s ease both; }

    /* Reply area */
    .reply-area { background: var(--bg-card); border-top: 1px solid rgba(200,168,75,0.12); padding: 14px 20px; flex-shrink: 0; }
    .reply-textarea { width: 100%; border: 1px solid rgba(200,168,75,0.15); border-radius: var(--radius-lg, 12px); padding: 10px 14px; font-size: 14px; font-family: var(--sans); color: var(--text); background: var(--bg-2); outline: none; resize: none; transition: border-color 0.2s, box-shadow 0.2s; min-height: 72px; }
    .reply-textarea:focus { border-color: rgba(200,168,75,0.4); box-shadow: 0 0 0 3px rgba(200,168,75,0.15); }
    .reply-textarea::placeholder { color: var(--text-3); }
    .reply-actions { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .empty-detail { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 40px; color: var(--text-3); }

    /* Button overrides for dark theme */
    .btn-primary { background: var(--gold); color: var(--bg); border: none; font-family: var(--sans); font-weight: 600; }
    .btn-primary:hover { background: var(--gold-bright); }
    .btn-ghost { background: transparent; border: 1px solid rgba(200,168,75,0.2); color: var(--text-2); font-family: var(--sans); }
    .btn-ghost:hover { border-color: rgba(200,168,75,0.4); color: var(--text); }
  </style>
</head>
<body>
<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-title">The Archive</div>
      <div class="brand-sub" id="sb-portal">Student Portal</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/student-dashboard.html" class="nav-item" id="nav-dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </a>
      <a href="/course-catalog.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        My Courses
      </a>
      <a href="/gradebook.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Gradebook
      </a>
      <a href="/messaging.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Messages
      </a>
      <a href="/notifications.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Notifications
      </a>
      <a href="/student-profile.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </a>
      <a href="/sheet-music.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Sheet Music
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="handleLogout()">
        <div class="sidebar-avatar" id="sb-avatar">—</div>
        <div class="sidebar-user-info">
          <div class="user-name" id="sb-name">Loading…</div>
          <div class="user-role" id="sb-role">student</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-wrap" style="overflow:hidden;">
    <header class="topbar">
      <div class="topbar-title">Messages</div>
      <div class="topbar-actions">
        <a href="/notifications.html" class="icon-btn" title="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="badge-dot" id="notif-dot" style="display:none;"></span>
        </a>
        <div class="topbar-avatar" id="topbar-avatar">—</div>
      </div>
    </header>

    <div class="msg-layout">
      <!-- Thread list -->
      <div class="thread-panel">
        <div class="thread-panel-head">
          <div class="thread-search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search threads…" id="thread-search" oninput="filterThreads()">
          </div>
          <button class="btn btn-primary" style="width:100%;font-size:13px;" onclick="openNewThreadModal()">+ New Message</button>
        </div>
        <div class="thread-list" id="thread-list">
          <div style="padding:20px;text-align:center;color:var(--text-3);font-size:13px;">Loading…</div>
        </div>
      </div>

      <!-- Thread detail -->
      <div class="detail-panel" id="detail-panel">
        <div class="empty-detail" id="empty-detail">
          <div style="font-size:48px;margin-bottom:16px;">💬</div>
          <h3 style="font-family:var(--serif);font-style:italic;font-size:22px;margin-bottom:8px;color:var(--text);">Select a conversation</h3>
          <p style="font-size:13px;color:var(--text-3);">Choose a thread from the list or start a new message.</p>
        </div>
        <div id="thread-detail" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
          <div class="detail-header">
            <div class="detail-subject" id="detail-subject"></div>
            <div class="participant-chips" id="detail-participants"></div>
          </div>
          <div class="message-feed" id="message-feed"></div>
          <div class="reply-area">
            <textarea class="reply-textarea" id="reply-body" placeholder="Write a message…" rows="3"></textarea>
            <div class="reply-actions">
              <button class="btn btn-primary" onclick="sendReply()">Send</button>
              <label class="btn btn-ghost" style="cursor:pointer;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                Attach
                <input type="file" id="reply-attach" style="display:none;" onchange="handleAttach(this)">
              </label>
              <span id="attach-name" style="font-size:12px;color:var(--text-3);"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- New Message Modal -->
<div class="modal-overlay" id="new-thread-modal" style="display:none;">
  <div class="modal" style="max-width:520px;background:var(--bg-card);border:1px solid rgba(200,168,75,0.15);">
    <div class="modal-title" style="color:var(--text);font-family:var(--serif);font-style:italic;">New Message</div>
    <div class="form-group">
      <label class="form-label" style="color:var(--text-2);">Recipients</label>
      <div id="recipient-list" style="display:flex;flex-wrap:wrap;gap:6px;min-height:38px;border:1px solid rgba(200,168,75,0.15);border-radius:var(--radius);padding:8px;background:var(--bg-2);">
        <span style="font-size:13px;color:var(--text-3);">Loading users…</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" style="color:var(--text-2);">Subject</label>
      <input class="form-input" id="new-subject" placeholder="What is this message about?" style="background:var(--bg-2);border:1px solid rgba(200,168,75,0.15);color:var(--text);">
    </div>
    <div class="form-group">
      <label class="form-label" style="color:var(--text-2);">Message</label>
      <textarea class="form-textarea" id="new-body" placeholder="Write your message…" style="background:var(--bg-2);border:1px solid rgba(200,168,75,0.15);color:var(--text);"></textarea>
    </div>
    <div style="display:flex;gap:12px;margin-top:8px;">
      <button class="btn btn-primary" style="flex:1;" onclick="createThread()">Send Message</button>
      <button class="btn btn-ghost" onclick="document.getElementById('new-thread-modal').style.display='none'">Cancel</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth-guard.js"></script>
<script>
  let currentUser = null;
  let allThreads = [];
  let activeThreadId = null;
  let selectedRecipients = [];
  let allUsers = [];

  function toast(msg, type='success') {
    const tc = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type === 'error' ? 'error' : ''}`;
    t.textContent = msg;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function handleLogout() {
    localStorage.removeItem('archive_token');
    localStorage.removeItem('archive_user');
    window.location.href = '/index.html';
  }

  function relativeTime(str) {
    if (!str) return '';
    const diff = Date.now() - new Date(str).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `${mins}m`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h`;
    return `${Math.floor(hrs / 24)}d`;
  }

  function fullDateTime(str) {
    if (!str) return '';
    return new Date(str).toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function threadInitials(participants) {
    const others = participants.filter(p => p.id !== currentUser.id);
    if (others.length > 0) return others[0].avatar_initials || (others[0].first_name[0] + others[0].last_name[0]);
    return '??';
  }

  document.addEventListener('userLoaded', async (e) => {
    currentUser = e.detail;
    const initials = currentUser.avatar_initials || (currentUser.first_name[0] + currentUser.last_name[0]);
    document.getElementById('sb-avatar').textContent = initials;
    document.getElementById('topbar-avatar').textContent = initials;
    document.getElementById('sb-name').textContent = `${currentUser.first_name} ${currentUser.last_name}`;
    document.getElementById('sb-role').textContent = currentUser.role;
    if (currentUser.role === 'instructor') {
      document.getElementById('sb-portal').textContent = 'Instructor Portal';
      document.getElementById('nav-dashboard').href = '/instructor-dashboard.html';
    }
    loadThreads();
    loadUsersForModal();
    try {
      const nc = await api.get('/api/notifications/unread-count');
      if (nc.count > 0) document.getElementById('notif-dot').style.display = 'block';
    } catch {}
  });

  async function loadUsersForModal() {
    try {
      const data = await api.get('/api/admin/users');
      allUsers = (data.users || []).filter(u => u.id !== currentUser.id);
    } catch {
      try {
        allUsers = [];
      } catch {}
    }
  }

  async function loadThreads() {
    try {
      const data = await api.get('/api/messages/threads');
      allThreads = data.threads || [];
      renderThreadList(allThreads);
    } catch {
      document.getElementById('thread-list').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-3);font-size:13px;">Could not load threads.</div>';
    }
  }

  function renderThreadList(threads) {
    const container = document.getElementById('thread-list');
    if (!threads.length) {
      container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-3);font-size:13px;">No conversations yet. Start one!</div>';
      return;
    }
    container.innerHTML = threads.map(t => `
      <div class="thread-item ${t.id === activeThreadId ? 'active' : ''}" onclick="openThread(${t.id})">
        <div class="thread-avatar">${threadInitials(t.participants || [])}</div>
        <div class="thread-info">
          <div class="thread-subject">${t.subject}</div>
          <div class="thread-preview">${t.last_message || 'No messages yet'}</div>
        </div>
        <div class="thread-meta">
          <div class="thread-time">${t.last_message_at ? relativeTime(t.last_message_at) : ''}</div>
          ${t.unread_count > 0 ? `<span class="unread-badge">${t.unread_count}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  function filterThreads() {
    const q = document.getElementById('thread-search').value.toLowerCase();
    const filtered = allThreads.filter(t => t.subject.toLowerCase().includes(q) || (t.last_message || '').toLowerCase().includes(q));
    renderThreadList(filtered);
  }

  async function openThread(id) {
    activeThreadId = id;
    renderThreadList(allThreads);
    document.getElementById('empty-detail').style.display = 'none';
    const td = document.getElementById('thread-detail');
    td.style.display = 'flex';
    td.style.flexDirection = 'column';
    td.style.flex = '1';
    td.style.overflow = 'hidden';
    try {
      const data = await api.get(`/api/messages/threads/${id}`);
      const { thread, messages, participants } = data;
      document.getElementById('detail-subject').textContent = thread.subject;
      document.getElementById('detail-participants').innerHTML = participants.map(p => `
        <div class="participant-chip">
          <div class="participant-chip-avatar">${p.avatar_initials || (p.first_name[0] + p.last_name[0])}</div>
          ${p.first_name} ${p.last_name}
        </div>
      `).join('');
      renderMessages(messages);
      await api.post(`/api/messages/threads/${id}/read`, {});
      const t = allThreads.find(x => x.id === id);
      if (t) t.unread_count = 0;
      renderThreadList(allThreads);
    } catch {
      document.getElementById('message-feed').innerHTML = '<p style="text-align:center;color:var(--text-3);padding:40px;font-size:13px;">Could not load messages.</p>';
    }
  }

  function renderMessages(messages) {
    const feed = document.getElementById('message-feed');
    if (!messages.length) {
      feed.innerHTML = '<p style="text-align:center;color:var(--text-3);padding:40px;font-size:13px;">No messages yet.</p>';
      return;
    }
    feed.innerHTML = messages.map((m, i) => {
      const isMine = m.sender_id === currentUser.id;
      const initials = m.avatar_initials || ((m.first_name || '?')[0] + (m.last_name || '?')[0]);
      return `
        <div class="msg-bubble-wrap ${isMine ? 'own' : ''}" style="animation-delay:${i * 0.04}s;">
          <div class="msg-sender-avatar" style="background:${isMine ? 'rgba(200,168,75,0.25)' : 'var(--bg-elevated)'};">${initials}</div>
          <div class="msg-bubble ${isMine ? 'mine' : 'theirs'}">
            ${!isMine ? `<div class="msg-sender-name">${m.first_name} ${m.last_name}</div>` : ''}
            <div class="msg-text">${m.body}</div>
            ${m.attachment_path ? `<a href="${m.attachment_path}" target="_blank" class="msg-attach">📎 Download attachment</a>` : ''}
            <div class="msg-time" title="${fullDateTime(m.created_at)}">${fullDateTime(m.created_at)}</div>
          </div>
        </div>
      `;
    }).join('');
    feed.scrollTop = feed.scrollHeight;
  }

  async function sendReply() {
    const body = document.getElementById('reply-body').value.trim();
    const attachFile = document.getElementById('reply-attach').files[0];
    if (!body && !attachFile) { toast('Message cannot be empty', 'error'); return; }
    try {
      if (attachFile) {
        const fd = new FormData();
        fd.append('body', body || '(attachment)');
        fd.append('attachment', attachFile);
        await api.upload(`/api/messages/threads/${activeThreadId}/reply`, fd);
      } else {
        await api.post(`/api/messages/threads/${activeThreadId}/reply`, { body });
      }
      document.getElementById('reply-body').value = '';
      document.getElementById('reply-attach').value = '';
      document.getElementById('attach-name').textContent = '';
      openThread(activeThreadId);
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  function handleAttach(input) {
    const name = input.files[0] ? input.files[0].name : '';
    document.getElementById('attach-name').textContent = name;
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && document.activeElement.id === 'reply-body') {
      e.preventDefault();
      sendReply();
    }
  });

  function openNewThreadModal() {
    selectedRecipients = [];
    document.getElementById('new-subject').value = '';
    document.getElementById('new-body').value = '';
    renderRecipientPicker();
    document.getElementById('new-thread-modal').style.display = 'flex';
  }

  function renderRecipientPicker() {
    const container = document.getElementById('recipient-list');
    container.innerHTML = '';
    selectedRecipients.forEach(u => {
      const chip = document.createElement('div');
      chip.style.cssText = 'display:inline-flex;align-items:center;gap:6px;background:rgba(200,168,75,0.2);color:var(--text);border:1px solid rgba(200,168,75,0.3);border-radius:99px;padding:4px 10px;font-size:12px;font-weight:600;';
      chip.innerHTML = `${u.first_name} ${u.last_name} <span style="cursor:pointer;color:var(--gold);" onclick="removeRecipient(${u.id})">×</span>`;
      container.appendChild(chip);
    });
    const input = document.createElement('input');
    input.placeholder = selectedRecipients.length ? 'Add more…' : 'Type a name…';
    input.style.cssText = 'border:none;outline:none;font-size:13px;min-width:120px;flex:1;font-family:var(--sans);background:transparent;color:var(--text);';
    input.oninput = () => showUserSuggestions(input.value, input);
    container.appendChild(input);
    input.focus();
  }

  function showUserSuggestions(query, inputEl) {
    document.getElementById('user-suggestions')?.remove();
    if (!query) return;
    const matches = allUsers.filter(u =>
      `${u.first_name} ${u.last_name} ${u.email}`.toLowerCase().includes(query.toLowerCase()) &&
      !selectedRecipients.find(r => r.id === u.id)
    ).slice(0, 6);
    if (!matches.length) return;
    const dd = document.createElement('div');
    dd.id = 'user-suggestions';
    dd.style.cssText = 'position:absolute;background:var(--bg-card);border:1px solid rgba(200,168,75,0.2);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:300;min-width:260px;max-height:200px;overflow-y:auto;';
    const rect = inputEl.getBoundingClientRect();
    dd.style.top = (rect.bottom + window.scrollY + 4) + 'px';
    dd.style.left = rect.left + 'px';
    matches.forEach(u => {
      const item = document.createElement('div');
      item.style.cssText = 'padding:10px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;color:var(--text);';
      item.innerHTML = `<div style="width:30px;height:30px;border-radius:50%;background:var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text);flex-shrink:0;">${u.avatar_initials || (u.first_name[0]+u.last_name[0])}</div><div><div style="font-weight:600;">${u.first_name} ${u.last_name}</div><div style="font-size:11px;color:var(--text-3);">${u.role}</div></div>`;
      item.onmouseenter = () => item.style.background = 'var(--bg-elevated)';
      item.onmouseleave = () => item.style.background = '';
      item.onclick = () => { addRecipient(u); dd.remove(); };
      dd.appendChild(item);
    });
    document.body.appendChild(dd);
    document.addEventListener('click', () => dd.remove(), { once: true });
  }

  function addRecipient(u) {
    if (!selectedRecipients.find(r => r.id === u.id)) {
      selectedRecipients.push(u);
    }
    renderRecipientPicker();
  }

  function removeRecipient(id) {
    selectedRecipients = selectedRecipients.filter(r => r.id !== id);
    renderRecipientPicker();
  }

  async function createThread() {
    if (!selectedRecipients.length) { toast('Select at least one recipient', 'error'); return; }
    const subject = document.getElementById('new-subject').value.trim();
    const body = document.getElementById('new-body').value.trim();
    if (!subject) { toast('Subject is required', 'error'); return; }
    if (!body) { toast('Message body is required', 'error'); return; }
    try {
      const data = await api.post('/api/messages/threads', {
        subject,
        first_message: body,
        participant_ids: selectedRecipients.map(r => r.id)
      });
      document.getElementById('new-thread-modal').style.display = 'none';
      toast('Message sent!');
      await loadThreads();
      openThread(data.thread.id);
    } catch (err) {
      toast(err.message, 'error');
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
  gsap.registerPlugin(ScrollTrigger);
  gsap.from('.page-header, .stat-card, .content-card', {
    y: 24, opacity: 0, duration: 0.65, stagger: 0.07, ease: 'power3.out', delay: 0.1
  });
  gsap.utils.toArray('.section-block, .card-row, tr').forEach(el => {
    gsap.from(el, { scrollTrigger: { trigger: el, start: 'top 88%' },
      y: 16, opacity: 0, duration: 0.5, ease: 'power2.out' });
  });
</script>
</body>
</html>
