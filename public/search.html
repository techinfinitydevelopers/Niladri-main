<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — The Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/archive.css">
  <style>
    .search-hero { margin-bottom: 28px; }

    /* Prominent dark search input with gold focus ring + magnifier */
    .search-hero-input-wrap { position: relative; margin-bottom: 16px; }
    .search-hero-input {
      width: 100%;
      padding: 16px 20px 16px 52px;
      font-size: 18px;
      font-family: var(--sans);
      background: var(--bg-card) !important;
      border: 2px solid rgba(200,168,75,0.20) !important;
      border-radius: var(--radius-lg);
      color: var(--text) !important;
      box-shadow: var(--shadow);
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
      outline: none;
    }
    .search-hero-input:focus {
      border-color: var(--gold) !important;
      box-shadow: 0 0 0 4px rgba(200,168,75,0.14) !important;
    }
    .search-hero-input::placeholder { color: var(--text-3) !important; }
    .search-hero-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--gold); pointer-events: none; }

    /* Filter chips — dark, gold active */
    .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-chip {
      padding: 7px 16px; border-radius: 99px; font-size: 13px; font-weight: 600;
      border: 1.5px solid rgba(200,168,75,0.18);
      background: var(--bg-card); color: var(--text-2);
      cursor: pointer; transition: all 0.15s ease;
    }
    .filter-chip:hover { border-color: var(--gold); color: var(--gold); }
    .filter-chip.active { background: var(--gold); border-color: var(--gold); color: #0F0D0B; }

    /* Results */
    .results-section { margin-bottom: 28px; }
    .results-section-title {
      font-size: 11px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .results-section-count {
      background: var(--bg-elevated); color: var(--text-2);
      border: 1px solid rgba(200,168,75,0.12);
      border-radius: 99px; padding: 1px 8px;
      font-size: 10px; font-weight: 700;
    }

    /* Result cards — dark, gold title highlight */
    .result-card {
      background: var(--bg-card);
      border: 1px solid rgba(200,168,75,0.10);
      border-radius: var(--radius);
      padding: 14px 18px; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 8px; cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
      text-decoration: none; color: inherit;
    }
    .result-card:hover {
      box-shadow: var(--shadow-lg); transform: translateY(-1px);
      border-color: rgba(200,168,75,0.25);
    }
    .result-icon {
      width: 40px; height: 40px; border-radius: var(--radius);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    /* Gold title for result cards */
    .result-title { font-weight: 600; font-size: 14px; color: var(--gold); margin-bottom: 2px; }
    .result-sub { font-size: 12px; color: var(--text-3); }

    /* Type badges */
    .type-badge { display: inline-flex; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .type-course { background: rgba(200,168,75,0.10); color: var(--gold); border: 1px solid rgba(200,168,75,0.20); }
    .type-sheet { background: rgba(200,168,75,0.06); color: var(--gold-bright); border: 1px solid rgba(200,168,75,0.15); }
    .type-master { background: rgba(200,168,75,0.12); color: var(--gold); border: 1px solid rgba(200,168,75,0.22); }
    .type-resource { background: rgba(200,168,75,0.05); color: var(--text-2); border: 1px solid rgba(200,168,75,0.12); }
    .type-user { background: rgba(200,168,75,0.08); color: var(--gold); border: 1px solid rgba(200,168,75,0.18); }

    .avatar-initials {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--bg-elevated); border: 1.5px solid rgba(200,168,75,0.22);
      color: var(--gold); font-weight: 700; font-size: 14px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .color-swatch { width: 40px; height: 40px; border-radius: var(--radius); flex-shrink: 0; }

    .empty-state { text-align: center; padding: 60px 40px; color: var(--text-3); }
    .empty-icon { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.3; }
    .no-results { font-style: italic; font-size: 16px; color: var(--text-2); }
    .featured-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-title">The Archive</div>
      <div class="brand-sub">Music School</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/student-dashboard.html" class="nav-item" id="nav-dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </a>
      <a href="/course-catalog.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Library
      </a>
      <a href="/search.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </a>
      <a href="/live-classes.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
        Live Classes
      </a>
      <a href="/certificates.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
        Certificates
      </a>
      <a href="/payments.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Payments
      </a>
      <a href="/announcements.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Announcements
      </a>
      <a href="/resource-library.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Resources
      </a>
      <a href="/sheet-music.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Sheet Music
      </a>
      <a href="/archive-browse.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        Archive
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="handleLogout()">
        <div class="sidebar-avatar" id="sb-avatar">—</div>
        <div class="sidebar-user-info">
          <div class="user-name" id="sb-name">Loading…</div>
          <div class="user-role" id="sb-role">Student</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title">Search</div>
      <div class="topbar-actions">
        <div class="topbar-avatar" id="topbar-avatar">—</div>
      </div>
    </header>

    <main class="main-content">
      <div class="search-hero page-header">
        <div class="search-hero-input-wrap">
          <svg class="search-hero-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-hero-input" id="search-input" placeholder="Search courses, sheet music, students…" autocomplete="off" autofocus>
        </div>
        <div class="filter-chips" id="filter-chips">
          <button class="filter-chip active" data-type="all" onclick="setFilter('all', this)">All</button>
          <button class="filter-chip" data-type="courses" onclick="setFilter('courses', this)">Courses</button>
          <button class="filter-chip" data-type="sheet_music" onclick="setFilter('sheet_music', this)">Sheet Music</button>
          <button class="filter-chip" data-type="masterclasses" onclick="setFilter('masterclasses', this)">Masterclasses</button>
          <button class="filter-chip" data-type="resources" onclick="setFilter('resources', this)">Resources</button>
          <button class="filter-chip" id="students-chip" data-type="students" onclick="setFilter('students', this)" style="display:none;">Students</button>
        </div>
      </div>

      <div id="search-results">
        <!-- Default: featured courses -->
        <div id="featured-state">
          <div class="section-header mb-16">
            <div class="section-title">Featured Courses</div>
            <a href="/course-catalog.html" style="font-size:13px;color:var(--gold);font-weight:600;">View all →</a>
          </div>
          <div class="featured-grid" id="featured-courses-grid">
            <div class="card skeleton" style="height:100px;"></div>
            <div class="card skeleton" style="height:100px;"></div>
            <div class="card skeleton" style="height:100px;"></div>
          </div>
        </div>
        <div id="results-state" style="display:none;"></div>
        <div id="empty-state" style="display:none;">
          <div class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <div class="no-results">No results for "<span id="empty-query"></span>"</div>
            <p style="margin-top:8px;font-size:13px;color:var(--text-3);">Try a different search term or browse the library.</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth-guard.js"></script>
<script>
  let debounceTimer = null;
  let currentFilter = 'all';
  let currentUser = null;

  function toast(msg, type = 'success') {
    const tc = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast${type === 'error' ? ' error' : ''}`;
    t.textContent = msg;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  function handleLogout() {
    localStorage.removeItem('archive_token');
    localStorage.removeItem('archive_user');
    window.location.href = '/index.html';
  }

  document.addEventListener('userLoaded', (e) => {
    currentUser = e.detail;
    document.getElementById('sb-avatar').textContent = currentUser.avatar_initials || (currentUser.first_name[0] + currentUser.last_name[0]);
    document.getElementById('sb-name').textContent = currentUser.first_name + ' ' + currentUser.last_name;
    document.getElementById('sb-role').textContent = currentUser.role === 'instructor' ? 'Instructor' : 'Student';
    document.getElementById('topbar-avatar').textContent = currentUser.avatar_initials || (currentUser.first_name[0] + currentUser.last_name[0]);
    document.getElementById('nav-dashboard').href = currentUser.role === 'instructor' ? '/instructor-dashboard.html' : '/student-dashboard.html';

    if (['instructor', 'admin'].includes(currentUser.role)) {
      document.getElementById('students-chip').style.display = '';
    }

    loadFeaturedCourses();

    const q = new URLSearchParams(window.location.search).get('q');
    if (q) {
      document.getElementById('search-input').value = q;
      runSearch(q);
    }
  });

  document.getElementById('search-input').addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    const q = e.target.value.trim();
    debounceTimer = setTimeout(() => {
      if (q.length > 0) runSearch(q);
      else showFeatured();
    }, 300);
  });

  document.getElementById('search-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      clearTimeout(debounceTimer);
      const q = e.target.value.trim();
      if (q) runSearch(q);
    }
  });

  function setFilter(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    const q = document.getElementById('search-input').value.trim();
    if (q) runSearch(q);
  }

  async function runSearch(query) {
    const url = new URL(window.location);
    url.searchParams.set('q', query);
    window.history.replaceState({}, '', url);

    try {
      const data = await api.get(`/api/search?q=${encodeURIComponent(query)}&type=${currentFilter}`);
      if (!data.results || data.results.length === 0) {
        showEmpty(query);
      } else {
        showResults(data.results, data.counts, query);
      }
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  function showFeatured() {
    document.getElementById('featured-state').style.display = '';
    document.getElementById('results-state').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';
    const url = new URL(window.location);
    url.searchParams.delete('q');
    window.history.replaceState({}, '', url);
  }

  function showEmpty(query) {
    document.getElementById('featured-state').style.display = 'none';
    document.getElementById('results-state').style.display = 'none';
    document.getElementById('empty-state').style.display = '';
    document.getElementById('empty-query').textContent = query;
  }

  function showResults(results, counts, query) {
    document.getElementById('featured-state').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';
    const el = document.getElementById('results-state');
    el.style.display = '';

    const groups = {};
    results.forEach(r => {
      if (!groups[r.type]) groups[r.type] = [];
      groups[r.type].push(r);
    });

    const typeLabels = { course: 'Courses', user: 'Students', sheet_music: 'Sheet Music', masterclass: 'Masterclasses', resource: 'Resources' };
    const typeIcons = {
      course: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
      sheet_music: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
      masterclass: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
      resource: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
      user: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`
    };

    el.innerHTML = Object.entries(groups).map(([type, items]) => `
      <div class="results-section">
        <div class="results-section-title">
          ${typeLabels[type] || type}
          <span class="results-section-count">${items.length}</span>
        </div>
        ${items.map(r => renderResultCard(r, typeIcons[type] || '')).join('')}
      </div>
    `).join('');
  }

  function renderResultCard(r, icon) {
    if (r.type === 'course') {
      return `<a href="/course-detail.html?id=${r.id}" class="result-card">
        <div class="color-swatch" style="background:${r.cover_color || '#2D3A1E'};border-radius:var(--r-md);"></div>
        <div style="flex:1;">
          <div class="result-title">${r.title}</div>
          <div class="result-sub">${r.instructor_name || ''}</div>
        </div>
        <span class="type-badge type-course">${r.level || 'Course'}</span>
      </a>`;
    }
    if (r.type === 'sheet_music') {
      return `<a href="/sheet-music.html" class="result-card">
        <div class="result-icon" style="background:rgba(200,168,75,0.08);color:var(--gold);">${icon}</div>
        <div style="flex:1;">
          <div class="result-title">${r.title}</div>
          <div class="result-sub">${r.composer || ''}${r.period ? ' · ' + r.period : ''}</div>
        </div>
        <span class="type-badge type-sheet">${r.period || 'Sheet Music'}</span>
      </a>`;
    }
    if (r.type === 'masterclass') {
      const d = r.scheduled_at ? new Date(r.scheduled_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
      return `<a href="/archive-browse.html" class="result-card">
        <div class="result-icon" style="background:rgba(200,168,75,0.10);color:var(--gold-bright);">${icon}</div>
        <div style="flex:1;">
          <div class="result-title">${r.title}</div>
          <div class="result-sub">${r.instructor_name || ''}${d ? ' · ' + d : ''}</div>
        </div>
        <span class="type-badge type-master">Masterclass</span>
      </a>`;
    }
    if (r.type === 'resource') {
      return `<a href="/resource-library.html" class="result-card">
        <div class="result-icon" style="background:var(--bg-elevated);color:var(--text-2);">${icon}</div>
        <div style="flex:1;">
          <div class="result-title">${r.title}</div>
          <div class="result-sub">${r.course_title || ''}${r.file_type ? ' · ' + r.file_type.toUpperCase() : ''}</div>
        </div>
        <span class="type-badge type-resource">${r.file_type ? r.file_type.toUpperCase() : 'File'}</span>
      </a>`;
    }
    if (r.type === 'user') {
      const initials = r.name ? r.name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase() : '?';
      return `<div class="result-card">
        <div class="avatar-initials">${initials}</div>
        <div style="flex:1;">
          <div class="result-title">${r.name}</div>
          <div class="result-sub">${r.instrument || ''}${r.email ? ' · ' + r.email : ''}</div>
        </div>
        <span class="type-badge type-user">${r.role || 'Student'}</span>
      </div>`;
    }
    return '';
  }

  async function loadFeaturedCourses() {
    try {
      const data = await api.get('/api/courses');
      const grid = document.getElementById('featured-courses-grid');
      const courses = (data.courses || []).slice(0, 6);
      if (courses.length === 0) {
        grid.innerHTML = '<p style="color:var(--text-3);font-style:italic;">No courses yet.</p>';
        return;
      }
      grid.innerHTML = courses.map(c => `
        <a href="/course-detail.html?id=${c.id}" style="text-decoration:none;">
          <div class="card" style="padding:16px;cursor:pointer;background:var(--bg-card);border:1px solid rgba(200,168,75,0.10);" onmouseover="this.style.borderColor='rgba(200,168,75,0.28)'" onmouseout="this.style.borderColor='rgba(200,168,75,0.10)'">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
              <div style="width:12px;height:12px;border-radius:50%;background:${c.cover_color || '#2D3A1E'};flex-shrink:0;"></div>
              <span style="font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;">${c.level || 'Course'}</span>
            </div>
            <div style="font-family:var(--serif);font-style:italic;font-size:16px;font-weight:600;color:var(--gold);line-height:1.3;">${c.title}</div>
            <div style="font-size:12px;color:var(--text-3);margin-top:4px;">${c.instructor_name || ''}</div>
          </div>
        </a>
      `).join('');
    } catch (e) {
      document.getElementById('featured-courses-grid').innerHTML = '';
    }
  }
</script>
<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);
gsap.from('.page-header, .stat-card, .card, .list-item, .section-block', {
  y: 24, opacity: 0, duration: 0.65, stagger: 0.07, ease: 'power3.out', delay: 0.1
