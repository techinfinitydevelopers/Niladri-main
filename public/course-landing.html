<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course — The Foundation Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:         #080706;
      --ink-soft:    #0f0e0c;
      --ink-mid:     #1a1916;
      --gold:        #C8A84B;
      --gold-bright: #E2C26A;
      --gold-dim:    #8C7033;
      --gold-bg:     rgba(200,168,75,.08);
      --cream:       #F0E6D3;
      --cream-dim:   #b8ad9e;
      --ghost:       rgba(240,230,211,.06);
      --ghost-mid:   rgba(240,230,211,.12);
      --ghost-hi:    rgba(240,230,211,.18);
      --border:      rgba(200,168,75,.15);
      --border-hi:   rgba(200,168,75,.35);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
      --radius:       4px;
      --max:          1280px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--ink);
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 64px;
      display: flex; align-items: center;
      padding: 0 40px;
      background: rgba(8,7,6,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--gold); letter-spacing: .04em; }
    .nav-logo span { font-size: 10px; font-family: var(--font-body); font-weight: 400; color: var(--cream-dim); display: block; letter-spacing: .2em; text-transform: uppercase; margin-top: -4px; }
    .nav-spacer { flex: 1; }
    .nav-btn {
      padding: 9px 24px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
      letter-spacing: .06em; text-transform: uppercase; cursor: pointer; border: none;
      transition: all .2s;
    }
    .nav-ghost { background: transparent; border: 1px solid var(--border-hi); color: var(--cream); margin-right: 12px; }
    .nav-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .nav-gold { background: var(--gold); color: var(--ink); }
    .nav-gold:hover { background: var(--gold-bright); }
    .nav-back { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--cream-dim); margin-right: 24px; transition: color .2s; }
    .nav-back:hover { color: var(--gold); }
    .nav-back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ─── HERO BAND ─── */
    #hero {
      margin-top: 64px;
      min-height: 520px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      position: relative;
      overflow: hidden;
    }
    .hero-left {
      padding: 72px 60px 72px 80px;
      display: flex; flex-direction: column; justify-content: center;
      position: relative; z-index: 2;
    }
    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
      opacity: .55;
    }
    .hero-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, var(--ink) 40%, transparent 100%);
    }
    .hero-eyebrow {
      font-family: var(--font-body); font-size: 11px; font-weight: 500;
      letter-spacing: .25em; text-transform: uppercase; color: var(--gold);
      margin-bottom: 20px;
    }
    .hero-title {
      font-family: var(--font-display); font-size: clamp(38px, 5vw, 64px);
      font-weight: 600; line-height: 1.08; color: var(--cream);
      margin-bottom: 16px;
    }
    .hero-subtitle {
      font-family: var(--font-display); font-size: 22px; font-style: italic;
      color: var(--cream-dim); margin-bottom: 32px; font-weight: 300;
    }
    .hero-meta {
      display: flex; gap: 28px; flex-wrap: wrap;
    }
    .hero-stat { display: flex; flex-direction: column; gap: 4px; }
    .hero-stat-val { font-family: var(--font-display); font-size: 28px; font-weight: 600; color: var(--gold); line-height: 1; }
    .hero-stat-label { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--cream-dim); }

    /* sticky enroll card */
    .enroll-panel {
      background: var(--ink-mid);
      border-left: 1px solid var(--border);
      padding: 48px 36px;
      display: flex; flex-direction: column; align-items: center;
      position: sticky; top: 64px; align-self: start;
      max-height: calc(100vh - 64px);
      overflow-y: auto;
      z-index: 2;
    }
    .enroll-price {
      font-family: var(--font-display); font-size: 42px; font-weight: 600;
      color: var(--gold); margin-bottom: 6px; text-align: center;
    }
    .enroll-price-note { font-size: 12px; color: var(--cream-dim); text-align: center; margin-bottom: 28px; letter-spacing: .06em; }
    .btn-enroll-big {
      width: 100%;
      padding: 16px 24px;
      background: var(--gold);
      color: var(--ink);
      font-size: 14px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      border: none; border-radius: var(--radius);
      cursor: pointer; transition: all .25s;
      text-align: center; display: block;
    }
    .btn-enroll-big:hover { background: var(--gold-bright); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,168,75,.25); }
    .btn-enroll-big:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .enroll-divider { width: 100%; border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .enroll-perks { list-style: none; width: 100%; }
    .enroll-perks li {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13px; color: var(--cream-dim); margin-bottom: 12px; line-height: 1.4;
    }
    .enroll-perks li svg { width: 14px; height: 14px; stroke: var(--gold); fill: none; stroke-width: 2.5; flex-shrink: 0; margin-top: 2px; }
    .enroll-note { font-size: 11px; color: var(--cream-dim); text-align: center; margin-top: 16px; letter-spacing: .04em; }
    .enroll-success {
      display: none;
      flex-direction: column; align-items: center; gap: 12px;
      padding: 20px; background: rgba(200,168,75,.1);
      border: 1px solid var(--border-hi); border-radius: var(--radius);
      text-align: center; margin-bottom: 20px; width: 100%;
    }
    .enroll-success svg { width: 32px; height: 32px; stroke: var(--gold); fill: none; stroke-width: 2; }
    .enroll-success p { font-size: 13px; color: var(--cream-dim); }
    .enroll-success strong { color: var(--gold); font-size: 15px; }

    /* ─── LAYOUT ─── */
    .page-wrap {
      max-width: var(--max); margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      align-items: start;
    }
    .page-main { padding: 80px 60px 80px 80px; }
    .page-side { position: sticky; top: 64px; padding: 0 36px 80px; }

    /* ─── SECTIONS ─── */
    .section { margin-bottom: 72px; }
    .section-label {
      font-size: 11px; font-weight: 500; letter-spacing: .25em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 16px;
    }
    .section-heading {
      font-family: var(--font-display); font-size: 38px; font-weight: 600;
      line-height: 1.15; margin-bottom: 24px; color: var(--cream);
    }
    .section-heading em { font-style: italic; color: var(--gold); }
    .section-body { color: var(--cream-dim); font-size: 15px; line-height: 1.8; }
    .section-body p + p { margin-top: 16px; }
    .section-sep { border: none; border-top: 1px solid var(--border); margin-bottom: 72px; }

    /* outcomes grid */
    .outcomes-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-top: 32px;
    }
    .outcome-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 16px; background: var(--ghost); border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 13px; color: var(--cream-dim); line-height: 1.4;
    }
    .outcome-item svg { width: 16px; height: 16px; stroke: var(--gold); fill: none; stroke-width: 2.5; flex-shrink: 0; margin-top: 1px; }

    /* ─── CURRICULUM ─── */
    .curriculum-summary {
      display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .curr-stat { font-size: 13px; color: var(--cream-dim); }
    .curr-stat strong { color: var(--cream); font-weight: 500; }
    .chapter {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 8px;
    }
    .chapter-header {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 22px;
      background: var(--ghost);
      cursor: pointer;
      transition: background .2s;
      user-select: none;
    }
    .chapter-header:hover { background: var(--ghost-mid); }
    .chapter-num {
      font-family: var(--font-display); font-size: 28px; font-weight: 300;
      color: var(--gold-dim); line-height: 1; flex-shrink: 0; width: 32px;
    }
    .chapter-info { flex: 1; }
    .chapter-title { font-size: 14px; font-weight: 500; color: var(--cream); }
    .chapter-meta { font-size: 12px; color: var(--cream-dim); margin-top: 2px; }
    .chapter-toggle { width: 18px; height: 18px; flex-shrink: 0; color: var(--cream-dim); transition: transform .3s; }
    .chapter-toggle svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 2; }
    .chapter.open .chapter-toggle { transform: rotate(180deg); }
    .chapter-lessons { display: none; border-top: 1px solid var(--border); }
    .chapter.open .chapter-lessons { display: block; }
    .lesson-row {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 22px 13px 70px;
      border-bottom: 1px solid rgba(200,168,75,.07);
      font-size: 13px; color: var(--cream-dim);
      transition: background .15s;
    }
    .lesson-row:last-child { border-bottom: none; }
    .lesson-row:hover { background: var(--ghost); color: var(--cream); }
    .lesson-type-icon { width: 28px; height: 28px; border-radius: 50%; background: var(--ghost-mid); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .lesson-type-icon svg { width: 12px; height: 12px; stroke: var(--gold-dim); fill: none; stroke-width: 2; }
    .lesson-name { flex: 1; }
    .lesson-lock { width: 14px; height: 14px; color: var(--gold-dim); }
    .lesson-lock svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 2; }
    .lesson-dur { font-size: 11px; color: var(--cream-dim); min-width: 36px; text-align: right; }

    /* ─── INSTRUCTOR ─── */
    .instructor-card-pub {
      display: flex; gap: 28px; align-items: flex-start;
      padding: 36px; background: var(--ghost); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .instructor-avatar-big {
      width: 96px; height: 96px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 32px; font-weight: 600;
      color: var(--gold); flex-shrink: 0;
      border: 2px solid var(--border-hi);
    }
    .instructor-info-name { font-family: var(--font-display); font-size: 28px; font-weight: 600; color: var(--cream); margin-bottom: 4px; }
    .instructor-info-subject { font-size: 12px; letter-spacing: .15em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .instructor-info-bio { font-size: 14px; color: var(--cream-dim); line-height: 1.8; }

    /* ─── TESTIMONIALS ─── */
    .testi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 28px; }
    .testi-card {
      padding: 28px; background: var(--ghost); border: 1px solid var(--border);
      border-radius: var(--radius); position: relative;
    }
    .testi-mark { font-family: var(--font-display); font-size: 60px; color: var(--gold-dim); line-height: .8; margin-bottom: 12px; display: block; }
    .testi-text { font-size: 14px; color: var(--cream-dim); line-height: 1.7; margin-bottom: 16px; font-style: italic; }
    .testi-author { font-size: 12px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--cream); }
    .testi-origin { font-size: 11px; color: var(--cream-dim); margin-top: 2px; }
    .stars { display: flex; gap: 3px; margin-bottom: 12px; }
    .star { width: 10px; height: 10px; background: var(--gold); clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); }

    /* ─── BOTTOM ENROLL CTA ─── */
    .bottom-cta {
      background: linear-gradient(135deg, var(--ink-mid) 0%, #141210 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 52px 60px;
      display: flex; align-items: center; justify-content: space-between; gap: 40px;
      margin: 0 80px 80px;
    }
    .bottom-cta-text h2 { font-family: var(--font-display); font-size: 38px; font-weight: 600; color: var(--cream); margin-bottom: 8px; }
    .bottom-cta-text h2 em { font-style: italic; color: var(--gold); }
    .bottom-cta-text p { font-size: 15px; color: var(--cream-dim); }
    .bottom-cta-action { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .btn-enroll-bottom {
      padding: 18px 48px; background: var(--gold); color: var(--ink);
      font-size: 14px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      border: none; border-radius: var(--radius); cursor: pointer;
      transition: all .25s; white-space: nowrap;
    }
    .btn-enroll-bottom:hover { background: var(--gold-bright); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(200,168,75,.3); }
    .bottom-cta-note { font-size: 11px; color: var(--cream-dim); text-align: center; }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px 80px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 16px;
    }
    .footer-logo { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--gold); }
    .footer-copy { font-size: 12px; color: var(--cream-dim); }

    /* ─── LOADING SKELETON ─── */
    .loading-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; flex-direction: column; gap: 20px;
    }
    .loading-spinner {
      width: 40px; height: 40px; border: 2px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: var(--font-display); font-size: 20px; color: var(--cream-dim); }

    /* ─── ERROR STATE ─── */
    .error-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; flex-direction: column; gap: 16px; padding: 40px;
    }
    .error-code { font-family: var(--font-display); font-size: 80px; color: var(--border); line-height: 1; }
    .error-msg { font-family: var(--font-display); font-size: 24px; color: var(--cream-dim); }
    .error-link { margin-top: 12px; padding: 12px 28px; border: 1px solid var(--border-hi); border-radius: var(--radius); font-size: 13px; color: var(--cream-dim); transition: all .2s; }
    .error-link:hover { border-color: var(--gold); color: var(--gold); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      #hero { grid-template-columns: 1fr; }
      .enroll-panel { position: relative; top: 0; border-left: none; border-top: 1px solid var(--border); }
      .page-wrap { grid-template-columns: 1fr; }
      .page-main { padding: 48px 24px; }
      .page-side { position: relative; top: 0; padding: 0 24px 48px; }
      .hero-left { padding: 48px 24px; }
      .outcomes-grid { grid-template-columns: 1fr; }
      .testi-grid { grid-template-columns: 1fr; }
      .bottom-cta { flex-direction: column; margin: 0 24px 48px; padding: 36px 28px; }
      footer { padding: 32px 24px; }
      nav { padding: 0 20px; }
    }

    /* ─── REVEAL ANIM ─── */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity .6s ease, transform .6s ease; }
    .reveal.visible { opacity: 1; transform: none; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    TFR
  </a>
  <a href="/" class="nav-logo">TFR <span>The Foundation Room</span></a>
  <div class="nav-spacer"></div>
  <a href="/login" class="nav-btn nav-ghost">Sign In</a>
  <a href="/login#panel-register" class="nav-btn nav-gold">Join Now</a>
</nav>

<!-- CONTENT (rendered by JS) -->
<div id="app">
  <div class="loading-wrap">
    <div class="loading-spinner"></div>
    <p class="loading-text">Loading course…</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

// ─── Helpers ────────────────────────────────────────────────────────────────
function qs(sel, ctx) { return (ctx || document).querySelector(sel); }
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

// ─── Get course slug or id from URL ─────────────────────────────────────────
// Supports both SEO URLs (/courses/sitar-the-complete-foundation)
// and legacy query strings (?id=1) for backward compatibility
let courseId = null;
const pathParts = window.location.pathname.split('/');
const slugFromPath = pathParts[pathParts.length - 1]; // last segment
if (slugFromPath && slugFromPath !== 'course-landing.html' && slugFromPath !== '') {
  courseId = slugFromPath; // slug (string) or numeric id
} else {
  const params = new URLSearchParams(window.location.search);
  courseId = params.get('id');
}

if (!courseId) {
  showError('No course specified.');
}

// ─── Auth helpers ────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('archive_token'); }
function isLoggedIn() { return !!getToken(); }
async function checkEnrolled(id) {
  try {
    const r = await fetch('/api/enrollments', { headers: { Authorization: 'Bearer ' + getToken() } });
    if (!r.ok) return false;
    const d = await r.json();
    return (d.enrollments || []).some(e => e.course_id == id);
  } catch { return false; }
}

// ─── Enrollment ──────────────────────────────────────────────────────────────
async function handleEnroll(courseId) {
  if (!isLoggedIn()) {
    sessionStorage.setItem('tfr_enroll_after_login', courseId);
    window.location.href = '/login#panel-register';
    return;
  }
  const btns = document.querySelectorAll('.enroll-trigger');
  btns.forEach(b => { b.disabled = true; b.textContent = 'Enrolling…'; });
  try {
    const r = await fetch('/api/enrollments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + getToken() },
      body: JSON.stringify({ course_id: courseId })
    });
    const d = await r.json();
    if (r.ok || d.message?.includes('already')) {
      // Show success state
      document.querySelectorAll('.enroll-success').forEach(s => { s.style.display = 'flex'; });
      btns.forEach(b => { b.textContent = 'Go to Course →'; b.disabled = false; b.onclick = () => { window.location.href = '/student-dashboard.html'; }; });
    } else {
      btns.forEach(b => { b.textContent = 'Enroll Now'; b.disabled = false; });
      alert(d.error || 'Enrollment failed. Please try again.');
    }
  } catch {
    btns.forEach(b => { b.textContent = 'Enroll Now'; b.disabled = false; });
    alert('Network error. Please try again.');
  }
}

// ─── Error screen ────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-wrap">
      <div class="error-code">404</div>
      <p class="error-msg">${msg}</p>
      <a href="/" class="error-link">← Back to Home</a>
    </div>`;
}

// ─── Format duration ─────────────────────────────────────────────────────────
function fmtDur(min) {
  if (!min) return '';
  if (min < 60) return min + 'm';
  const h = Math.floor(min / 60), m = min % 60;
  return m ? `${h}h ${m}m` : `${h}h`;
}

// ─── Lesson type icons ───────────────────────────────────────────────────────
function lessonIcon(type) {
  if (type === 'video') return `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
  if (type === 'reading') return `<svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>`;
  return `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
}

// ─── Outline dots per-category ───────────────────────────────────────────────
const OUTCOMES = {
  Sitar: ['Correct baithak posture and mizrab technique','Meend (glide) across all seven swaras','Alaap and gat in Raga Yaman','Daily riyaz structure to build muscle memory','Performance-ready composition in Teentaal'],
  Percussion: ['Core djembe sounds: bass, tone, slap','Alternating hand independence','Teentaal & Dadra on hand percussion','Polyrhythmic layering techniques','Create your own groove compositions'],

// ─── Render Page ─────────────────────────────────────────────────────────────
async function renderPage(data) {
  const { course, chapters } = data;
  const totalLessons = chapters.reduce((a, c) => a + c.lessons.length, 0);
  const totalMinutes = chapters.reduce((a, c) => a + c.lessons.reduce((b, l) => b + (l.duration_minutes || 0), 0), 0);

  document.title = `${course.title} — The Foundation Room`;

  const cat = course.category;
  const outcomes = OUTCOMES[cat] || OUTCOMES['Sitar'];
  const testimonials = TESTIMONIALS[cat] || TESTIMONIALS['Sitar'];

  let enrolled = false;
  if (isLoggedIn()) {
    enrolled = await checkEnrolled(course.id);
  }

  const enrollBtnLabel = enrolled ? 'Go to Course →' : 'Enroll Now — It\'s Free';
  const enrollBtnAction = enrolled
    ? `window.location.href='/student-dashboard.html'`
    : `handleEnroll(${course.id})`;

  const enrollSuccessHTML = enrolled ? `
    <div class="enroll-success" style="display:flex">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      <strong>You're enrolled!</strong>
      <p>Continue learning from your dashboard.</p>
    </div>` : `
    <div class="enroll-success">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      <strong>You're enrolled!</strong>
      <p>Head to your dashboard to begin.</p>
    </div>`;

  const html = `
    <!-- HERO -->
    <div id="hero">
      <div class="hero-bg" style="background:${course.cover_color || '#1a0d00'}"></div>
      <div class="hero-left">
        <p class="hero-eyebrow">${course.category} · ${course.level || 'All Levels'}</p>
        <h1 class="hero-title">${course.title}</h1>
        <p class="hero-subtitle">${course.subtitle || ''}</p>
        <div class="hero-meta">
          <div class="hero-stat">
            <span class="hero-stat-val">${course.duration_weeks || '—'}</span>
            <span class="hero-stat-label">Weeks</span>
          </div>
          <div class="hero-stat">
            <span class="hero-stat-val">${totalLessons}</span>
            <span class="hero-stat-label">Lessons</span>
          </div>
          <div class="hero-stat">
            <span class="hero-stat-val">${chapters.length}</span>
            <span class="hero-stat-label">Chapters</span>
          </div>
          <div class="hero-stat">
            <span class="hero-stat-val">${fmtDur(totalMinutes)}</span>
            <span class="hero-stat-label">Content</span>
          </div>
        </div>
      </div>

      <!-- STICKY ENROLL PANEL (inside hero grid) -->
      <div class="enroll-panel">
        ${enrollSuccessHTML}
        <div class="enroll-price">${course.is_paid ? '₹' + (course.price_paise / 100).toLocaleString('en-IN') : 'Free'}</div>
        <p class="enroll-price-note">${course.is_paid ? 'One-time payment · Lifetime access' : 'No cost · Full access on enroll'}</p>
        <button class="btn-enroll-big enroll-trigger" onclick="${enrollBtnAction}">${enrollBtnLabel}</button>
        <hr class="enroll-divider">
        <ul class="enroll-perks">
          <li><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>${course.lesson_count || totalLessons} structured lessons</li>
          <li><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Live masterclasses with the instructor</li>
          <li><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Sheet music &amp; notation downloads</li>
          <li><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Recording upload &amp; feedback</li>
          <li><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Certificate of completion</li>
          <li><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Lifetime access to all content</li>
        </ul>
        <p class="enroll-note">By enrolling you agree to our<br>Terms &amp; Privacy Policy</p>
      </div>
    </div>

    <!-- MAIN BODY -->
    <div class="page-wrap">
      <main class="page-main">

        <!-- ABOUT -->
        <div class="section reveal">
          <p class="section-label">About This Course</p>
          <h2 class="section-heading">What you will <em>experience</em></h2>
          <div class="section-body">
            ${course.description.split('. ').reduce((acc, s, i) => {
              if (i === 0 || i % 3 !== 0) return acc + (acc ? '. ' : '') + s;
              return acc + '.</p><p>' + s;
            }, '<p>') + '.</p>'}
          </div>
        </div>

        <!-- WHAT YOU'LL LEARN -->
        <div class="section reveal">
          <p class="section-label">Outcomes</p>
          <h2 class="section-heading">What you will <em>learn</em></h2>
          <div class="outcomes-grid">
            ${outcomes.map(o => `
              <div class="outcome-item">
                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                ${o}
              </div>`).join('')}
          </div>
        </div>

        <hr class="section-sep">

        <!-- CURRICULUM -->
        <div class="section reveal">
          <p class="section-label">Curriculum</p>
          <h2 class="section-heading">Course <em>structure</em></h2>
          <div class="curriculum-summary">
            <span class="curr-stat"><strong>${chapters.length}</strong> chapters</span>
            <span class="curr-stat"><strong>${totalLessons}</strong> lessons</span>
            <span class="curr-stat"><strong>${fmtDur(totalMinutes)}</strong> total runtime</span>
          </div>
          <div id="chapters-list">
            ${chapters.map((ch, idx) => `
              <div class="chapter${idx === 0 ? ' open' : ''}" id="ch-${ch.id}">
                <div class="chapter-header" onclick="toggleChapter('ch-${ch.id}')">
                  <span class="chapter-num">${String(idx + 1).padStart(2, '0')}</span>
                  <div class="chapter-info">
                    <div class="chapter-title">${ch.title}</div>
                    <div class="chapter-meta">${ch.lessons.length} lesson${ch.lessons.length !== 1 ? 's' : ''}${ch.description ? ' · ' + ch.description : ''}</div>
                  </div>
                  <span class="chapter-toggle"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span>
                </div>
                <div class="chapter-lessons">
                  ${ch.lessons.map((l, li) => `
                    <div class="lesson-row">
                      <div class="lesson-type-icon">${lessonIcon(l.type)}</div>
                      <span class="lesson-name">${l.title}</span>
                      ${li === 0 && idx === 0 ? '<span style="font-size:10px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase">Preview</span>' : '<span class="lesson-lock"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>'}
                      ${l.duration_minutes ? `<span class="lesson-dur">${fmtDur(l.duration_minutes)}</span>` : ''}
                    </div>`).join('')}
                </div>
              </div>`).join('')}
          </div>
        </div>

        <hr class="section-sep">

        <!-- INSTRUCTOR -->
        <div class="section reveal">
          <p class="section-label">Your Instructor</p>
          <h2 class="section-heading">Meet <em>${course.instructor_name.split(' ')[0]}</em></h2>
          <div class="instructor-card-pub">
            <div class="instructor-avatar-big" style="background: ${course.cover_color || '#1a0d00'}">
              ${course.instructor_initials || '??'}
            </div>
            <div>
              <p class="instructor-info-name">${course.instructor_name}</p>
              <p class="instructor-info-subject">${course.instrument || course.category}</p>
              <p class="instructor-info-bio">${course.instructor_bio || 'An extraordinary artist and dedicated teacher.'}</p>
            </div>
          </div>
        </div>

        <hr class="section-sep">

        <!-- TESTIMONIALS -->
        <div class="section reveal">
          <p class="section-label">Student Stories</p>
          <h2 class="section-heading">What our students <em>say</em></h2>
          <div class="testi-grid">
            ${testimonials.map(t => `
              <div class="testi-card">
                <span class="testi-mark">&ldquo;</span>
                <div class="stars">${'<div class="star"></div>'.repeat(5)}</div>
                <p class="testi-text">${t.text}</p>
                <p class="testi-author">${t.author}</p>
                <p class="testi-origin">${t.origin}</p>
              </div>`).join('')}
          </div>
        </div>

      </main>

      <!-- SIDE: additional enroll prompt on desktop (hidden, handled by hero panel) -->
      <aside class="page-side"></aside>
    </div>

    <!-- BOTTOM CTA -->
    <div class="bottom-cta reveal">
      <div class="bottom-cta-text">
        <h2>Ready to begin your <em>journey</em>?</h2>
        <p>Join ${course.instructor_name.split(' ')[0]}'s course and transform your relationship with ${course.instrument || 'music'} — for good.</p>
      </div>
      <div class="bottom-cta-action">
        <button class="btn-enroll-bottom enroll-trigger" onclick="${enrollBtnAction}">${enrollBtnLabel}</button>
        <span class="bottom-cta-note">${course.is_paid ? '₹' + (course.price_paise / 100).toLocaleString('en-IN') + ' · Lifetime access' : 'Free enrolment · No credit card needed'}</span>
      </div>
    </div>

    <!-- FOOTER -->
    <footer>
      <span class="footer-logo">TFR</span>
      <span class="footer-copy">© 2026 The Foundation Room. All rights reserved.</span>
      <a href="/" style="font-size:13px;color:var(--cream-dim)">← Back to Home</a>
    </footer>
  `;

  document.getElementById('app').innerHTML = html;

  // ─── GSAP Animations after render ───
  // Hero title words stagger
  const heroTitle = document.querySelector('.hero-title');
  if (heroTitle) {
    const words = heroTitle.innerHTML.split(' ');
    heroTitle.innerHTML = words.map(w => `<span style="display:inline-block; will-change:transform;">${w}</span>`).join(' ');
    gsap.from(heroTitle.querySelectorAll('span'), {
      opacity: 0, y: 30, duration: 0.55, stagger: 0.07, ease: 'power3.out', delay: 0.2
    });
  }

  // Hero eyebrow, subtitle
  gsap.from('.hero-eyebrow', { opacity: 0, y: 16, duration: 0.45, ease: 'power3.out', delay: 0.1 });
  gsap.from('.hero-subtitle', { opacity: 0, y: 16, duration: 0.45, ease: 'power3.out', delay: 0.5 });

  // Hero stats count-up
  document.querySelectorAll('.hero-stat-val').forEach(el => {
    const raw = parseFloat(el.textContent.replace(/[^0-9.]/g, ''));
    if (!isNaN(raw) && raw > 0) {
      const prefix = el.textContent.includes('₹') ? '₹' : '';
      const suffix = el.textContent.replace(/[0-9.,₹]/g, '');
      const obj = { v: 0 };
      gsap.to(obj, {
        v: raw, duration: 1.6, ease: 'power2.out', delay: 0.6,
        onUpdate: () => { el.textContent = prefix + Math.round(obj.v) + suffix; }
      });
    }
  });

  // Enroll button pulse
  const enrollBtns = document.querySelectorAll('.btn-enroll-big, .btn-enroll-bottom');
  enrollBtns.forEach(btn => {
    gsap.to(btn, {
      scale: 1.03, duration: 0.6, ease: 'power2.inOut',
      yoyo: true, repeat: -1, repeatDelay: 2.4
    });
  });

  // Curriculum chapters stagger from left on scroll
  gsap.utils.toArray('.chapter').forEach((ch, i) => {
    gsap.from(ch, {
      scrollTrigger: { trigger: ch, start: 'top 85%', once: true },
      x: -30, opacity: 0, duration: 0.5, delay: i * 0.04, ease: 'power3.out'
    });
  });

  // Section reveals
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, { threshold: .1 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

// ─── Chapter accordion ───────────────────────────────────────────────────────
function toggleChapter(id) {
  const ch = document.getElementById(id);
  ch.classList.toggle('open');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
(async () => {
  if (!courseId) return;
  try {
    const r = await fetch(`/api/public/courses/${courseId}`);
    if (!r.ok) throw new Error('Not found');
    const data = await r.json();
    await renderPage(data);

    // Auto-enroll if redirected back after login
    const pendingCourse = sessionStorage.getItem('tfr_enroll_after_login');
    if (pendingCourse && isLoggedIn() && pendingCourse == courseId) {
      sessionStorage.removeItem('tfr_enroll_after_login');
      await handleEnroll(courseId);
    }
  } catch (e) {
    showError('Course not found or unavailable.');
  }
})();
</script>
</body>
</html>
