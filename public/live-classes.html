<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Classes — The Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/archive.css">
  <style>
    /* Session cards */
    .session-card {
      background: var(--bg-card);
      border: 1px solid rgba(200,168,75,0.12);
      border-radius: var(--radius-lg);
      padding: 0; box-shadow: var(--shadow);
      display: flex; gap: 0; overflow: hidden;
      margin-bottom: 16px; transition: box-shadow 0.2s, border-color 0.2s;
    }
    .session-card:hover { box-shadow: var(--shadow-lg); border-color: rgba(200,168,75,0.25); }

    .session-date-col {
      width: 90px; min-width: 90px;
      background: var(--bg-elevated);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px 12px; color: var(--text); text-align: center;
      border-right: 1px solid rgba(200,168,75,0.12);
    }
    .session-date-col.live-col {
      background: rgba(200,168,75,0.10);
      border-right-color: rgba(200,168,75,0.20);
    }
    .session-date-day {
      font-family: var(--serif); font-size: 38px;
      font-weight: 600; line-height: 1; color: var(--gold);
    }
    .session-date-month { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; color: var(--text-2); }
    .session-date-time { font-size: 11px; color: var(--text-3); margin-top: 6px; }

    .session-body { flex: 1; padding: 20px 22px; }
    .session-title {
      font-family: var(--serif); font-style: italic;
      font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px;
    }
    .session-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; align-items: center; }
    .session-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--text-3); }
    .session-desc { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-bottom: 12px; }
    .session-actions { display: flex; align-items: center; gap: 10px; }

    /* Live indicator with pulsing gold dot */
    .status-live { display: inline-flex; align-items: center; gap: 6px; }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold-bright);
      animation: pulse-gold 1.4s ease-in-out infinite;
    }
    @keyframes pulse-gold {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(200,168,75,0.5); }
      50% { opacity: 0.85; transform: scale(1.25); box-shadow: 0 0 0 5px rgba(200,168,75,0); }
    }

    /* Join pill for upcoming sessions */
    .join-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--gold); color: #0F0D0B;
      border: none; border-radius: 99px;
      padding: 8px 18px; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }
    .join-pill:hover { background: var(--gold-bright); box-shadow: 0 0 16px rgba(200,168,75,0.30); }

    .countdown {
      font-size: 12px; font-weight: 600; color: var(--gold);
      background: rgba(200,168,75,0.10);
      padding: 3px 10px; border-radius: 99px;
      border: 1px solid rgba(200,168,75,0.20);
    }

    /* Past sessions — muted dark */
    .past-list {
      background: var(--bg-card);
      border: 1px solid rgba(200,168,75,0.08);
      border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow);
    }
    .past-item {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(200,168,75,0.06);
      opacity: 0.75; transition: opacity 0.15s, background 0.15s;
    }
    .past-item:last-child { border-bottom: none; }
    .past-item:hover { background: var(--bg-elevated); opacity: 1; }
    .past-date-badge {
      width: 44px; min-width: 44px; height: 44px; border-radius: var(--radius);
      background: var(--bg-elevated);
      border: 1px solid rgba(200,168,75,0.12);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .past-date-d { font-family: var(--serif); font-size: 16px; font-weight: 600; color: var(--text-2); line-height: 1; }
    .past-date-m { font-size: 9px; font-weight: 600; color: var(--text-3); text-transform: uppercase; }

    /* Playback button ghost */
    .btn-playback {
      background: transparent; color: var(--text-2);
      border: 1.5px solid rgba(200,168,75,0.20);
      font-size: 12px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: var(--r-md); text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-playback:hover { border-color: var(--gold); color: var(--gold); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      display: flex; align-items: center; justify-content: center;
      z-index: 300; animation: fadeIn 0.14s ease;
    }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid rgba(200,168,75,0.18);
      border-radius: var(--radius-lg); padding: 32px;
      width: 100%; max-width: 520px;
      box-shadow: var(--shadow-lg); animation: scaleIn 0.16s ease;
    }
    .modal-title {
      font-family: var(--serif); font-style: italic;
      font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 20px;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .section-divider { display: flex; align-items: center; gap: 14px; margin: 28px 0 20px; }
    .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: rgba(200,168,75,0.12); }
    .section-divider-label { font-size: 12px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }

    /* Buttons */
    .btn-primary { background: var(--gold); color: #0F0D0B; border: 1.5px solid var(--gold); font-weight: 700; }
    .btn-primary:hover { background: var(--gold-bright); border-color: var(--gold-bright); }
    .btn-outline { background: transparent; color: var(--gold); border: 1.5px solid rgba(200,168,75,0.35); font-weight: 600; }
    .btn-outline:hover { background: rgba(200,168,75,0.08); border-color: var(--gold); }
    .btn-ghost { background: transparent; color: var(--text-2); border: 1.5px solid rgba(200,168,75,0.15); }
    .btn-ghost:hover { border-color: rgba(200,168,75,0.35); color: var(--text); }

    /* Course tag chip */
    .course-chip { background: rgba(200,168,75,0.08); color: var(--gold); border-radius: 99px; padding: 2px 8px; font-size: 11px; font-weight: 600; border: 1px solid rgba(200,168,75,0.18); }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-title">The Archive</div>
      <div class="brand-sub">Music School</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/student-dashboard.html" class="nav-item" id="nav-dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </a>
      <a href="/course-catalog.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>

      <a href="/my-lessons.html" class="nav-item">

      </a>
      <a href="/live-classes.html" class="nav-item active">

      </a>
      <a href="/certificates.html" class="nav-item">

      <a href="/payments.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>

      </a>
      <a href="/resource-library.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Resources
      </a>
      <a href="/sheet-music.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>

      <a href="/archive-browse.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>

    <div class="sidebar-footer">

          <div class="user-role" id="sb-role">Student</div>
        </div>
      </div>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title">Live Classes</div>
      <div class="topbar-actions">
        <button class="icon-btn" id="schedule-btn" style="display:none;" onclick="openScheduleModal()" title="Schedule Session">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div class="topbar-avatar" id="topbar-avatar">—</div>
      </div>
    </header>

    <main class="main-content">
      <div class="page-header" style="margin-bottom:24px; display:flex; align-items:center; justify-content:space-between;">
        <div>
          <h1 class="page-title">Live Classes</h1>
          <p class="page-subtitle">Scheduled and on-demand sessions with your instructors.</p>
        </div>
        <button class="btn btn-primary" id="schedule-btn-main" style="display:none;" onclick="openScheduleModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Schedule Session
        </button>

      <!-- Upcoming / Live -->

      </div>
      <div id="upcoming-sessions">

<!-- Schedule Session Modal -->
<div class="modal-overlay" id="schedule-modal" style="display:none;">
  <div class="modal-box" style="max-width:560px;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
      <div class="modal-title">Schedule a Live Session</div>
      <button style="background:none;border:none;cursor:pointer;color:var(--text-3);" onclick="closeScheduleModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="form-group">
      <label class="form-label">Session Title *</label>
      <input class="form-input" id="sess-title" type="text" placeholder="e.g. Advanced Piano — Technique Masterclass">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="sess-desc" rows="3" placeholder="What will students learn in this session?"></textarea>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Date &amp; Time *</label>
        <input class="form-input" id="sess-datetime" type="datetime-local">
      </div>
      <div class="form-group">
        <label class="form-label">Duration (minutes)</label>
        <input class="form-input" id="sess-duration" type="number" value="60" min="15" max="480">
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Max Participants</label>
        <input class="form-input" id="sess-max" type="number" value="50" min="1" max="500">
      </div>
      <div class="form-group">
        <label class="form-label">Meeting URL</label>
        <input class="form-input" id="sess-url" type="text" placeholder="Auto-generated">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Linked Course <span style="font-weight:400;color:var(--text-3);">(optional)</span></label>
      <select class="form-select" id="sess-course">
        <option value="">None</option>
      </select>
    </div>
    <div style="display:flex; gap:10px; margin-top:4px;">
      <button class="btn btn-outline" onclick="generateMeetingLink()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Generate Meeting Link
      </button>
      <button class="btn btn-primary" style="flex:1;" id="create-session-btn" onclick="createSession()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Create Session
      </button>
      <button class="btn btn-ghost" onclick="closeScheduleModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth-guard.js"></script>
<script>
  let currentUser = null;

  function toast(msg, type = 'success') {
    const tc = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast${type === 'error' ? ' error' : ''}`;
    t.textContent = msg;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  function handleLogout() {
    localStorage.removeItem('archive_token');
    localStorage.removeItem('archive_user');
    window.location.href = '/index.html';
  }

  function formatDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function formatTime(str) {
    if (!str) return '';
    return new Date(str).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  function countdown(scheduledAt) {
    const diff = new Date(scheduledAt) - new Date();
    if (diff <= 0) return null;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    if (h > 24) return null;
    return h > 0 ? `Starting in ${h}h ${m}m` : `Starting in ${m}m`;
  }

  document.addEventListener('userLoaded', (e) => {
    currentUser = e.detail;
    document.getElementById('sb-avatar').textContent = currentUser.avatar_initials || (currentUser.first_name[0] + currentUser.last_name[0]);
    document.getElementById('sb-name').textContent = currentUser.first_name + ' ' + currentUser.last_name;
    document.getElementById('sb-role').textContent = currentUser.role === 'instructor' ? 'Instructor' : 'Student';
    document.getElementById('topbar-avatar').textContent = currentUser.avatar_initials || (currentUser.first_name[0] + currentUser.last_name[0]);
    document.getElementById('nav-dashboard').href = currentUser.role === 'instructor' ? '/instructor-dashboard.html' : '/student-dashboard.html';

    if (['instructor', 'admin', 'teaching_assistant'].includes(currentUser.role)) {
      document.getElementById('schedule-btn').style.display = '';
      document.getElementById('schedule-btn-main').style.display = '';
      loadCoursesForSelect();
    }
    loadSessions();
  });

  async function loadSessions() {
    try {
      const [upcoming, past] = await Promise.all([
        api.get('/api/live-sessions?status=scheduled'),
        api.get('/api/live-sessions?status=completed')
      ]);
      renderUpcoming([
        ...(upcoming.sessions || []),
      ]);
      api.get('/api/live-sessions?status=live').then(live => {
        renderUpcoming([...(live.sessions || []), ...(upcoming.sessions || [])]);
      }).catch(() => {});
      renderPast(past.sessions || []);
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  function renderUpcoming(sessions) {
    const el = document.getElementById('upcoming-sessions');
    if (!sessions || sessions.length === 0) {
      el.innerHTML = `<div class="card" style="text-align:center;padding:48px;color:var(--text-3);font-style:italic;">No upcoming sessions scheduled.</div>`;
      return;
    }
    el.innerHTML = sessions.map(s => {
      const d = new Date(s.scheduled_at);
      const cd = countdown(s.scheduled_at);
      const isLive = s.status === 'live';
      const isInstructor = currentUser && ['instructor', 'admin'].includes(currentUser.role);

      let actionBtn = '';
      if (isLive) {
        actionBtn = `<a href="${s.meeting_url || '#'}" target="_blank" class="join-pill">
          <span class="status-live"><span class="live-dot"></span> Join Now</span>
        </a>`;
      } else if (s.status === 'scheduled') {
        actionBtn = `<button class="join-pill" style="background:transparent;color:var(--gold);border:1.5px solid rgba(200,168,75,0.35);" onclick="registerSession(${s.id})">Register</button>`;
      }

      const instructorActions = isInstructor && s.instructor_id === currentUser.id ? `
        <button class="btn btn-ghost" style="font-size:12px;" onclick="setLive(${s.id})">Go Live</button>
        <button class="btn btn-ghost" style="font-size:12px;" onclick="endSession(${s.id})">End</button>
      ` : '';

      return `
        <div class="session-card">
          <div class="session-date-col${isLive ? ' live-col' : ''}">
            <div class="session-date-day">${d.getDate()}</div>
            <div class="session-date-month">${d.toLocaleString('en', { month: 'short' })}</div>
            <div class="session-date-time">${formatTime(s.scheduled_at)}</div>
          </div>
          <div class="session-body">
            <div class="session-title">${s.title}</div>
            <div class="session-meta">
              <span class="session-tag">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${s.duration_minutes || 60} min
              </span>
              <span class="session-tag">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                ${s.attendee_count || 0} / ${s.max_participants || 50}
              </span>
              ${s.instructor_name ? `<span class="session-tag">${s.instructor_name}</span>` : ''}
              ${s.course_title ? `<span class="course-chip">${s.course_title}</span>` : ''}
              ${cd ? `<span class="countdown">${cd}</span>` : ''}
            </div>
            ${s.description ? `<div class="session-desc">${s.description}</div>` : ''}
            <div class="session-actions">
              ${actionBtn}
              ${instructorActions}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function renderPast(sessions) {
    const el = document.getElementById('past-sessions');
    if (!sessions || sessions.length === 0) {
      el.innerHTML = `<div style="color:var(--text-3);font-style:italic;font-size:13px;padding:8px 0;">No past sessions yet.</div>`;
      return;
    }
    el.innerHTML = `<div class="past-list">${sessions.map(s => {
      const d = new Date(s.scheduled_at);
      return `
        <div class="past-item list-item">
          <div class="past-date-badge">
            <div class="past-date-d">${d.getDate()}</div>
            <div class="past-date-m">${d.toLocaleString('en', { month: 'short' })}</div>
          </div>
          <div style="flex:1;">
            <div style="font-weight:600; font-size:14px; color:var(--text-2);">${s.title}</div>
            <div style="font-size:12px; color:var(--text-3);">${s.instructor_name || ''} · ${s.duration_minutes || 60} min · ${formatDate(s.scheduled_at)}</div>
          </div>
          ${s.recording_url ? `<a href="${s.recording_url}" target="_blank" class="btn-playback">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            Recording
          </a>` : '<span style="font-size:12px;color:var(--text-3);">No recording</span>'}
        </div>`;
    }).join('')}</div>`;
  }

  async function registerSession(id) {
    try {
      const data = await api.post(`/api/live-sessions/${id}/join`);
      toast('Registered! Meeting URL: ' + (data.meeting_url || 'TBD'), 'success');
      loadSessions();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  async function setLive(id) {
    try {
      await api.put(`/api/live-sessions/${id}/status`, { status: 'live' });
      toast('Session is now live!', 'success');
      loadSessions();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  async function endSession(id) {
    const recordingUrl = prompt('Recording URL (optional):') || '';
    try {
      await api.put(`/api/live-sessions/${id}/status`, { status: 'completed', recording_url: recordingUrl || undefined });
      toast('Session ended.', 'success');
      loadSessions();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  async function loadCoursesForSelect() {
    try {
      const data = await api.get('/api/courses');
      const select = document.getElementById('sess-course');
      (data.courses || []).forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.title;
        select.appendChild(opt);
      });
    } catch (e) { /* ignore */ }
  }

  function generateMeetingLink() {
    const id = Math.random().toString(36).slice(2, 10);
    document.getElementById('sess-url').value = `https://meet.archive.edu/room/${id}`;
  }

  function openScheduleModal() {
    generateMeetingLink();
    document.getElementById('schedule-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('sess-title').focus(), 50);
  }

  function closeScheduleModal() {
    document.getElementById('schedule-modal').style.display = 'none';
  }

  document.getElementById('schedule-modal').addEventListener('click', function(e) {
    if (e.target === this) closeScheduleModal();
  });

  async function createSession() {
    const btn = document.getElementById('create-session-btn');
    const title = document.getElementById('sess-title').value.trim();
    const scheduled_at = document.getElementById('sess-datetime').value;
    if (!title || !scheduled_at) { toast('Title and date/time are required', 'error'); return; }

    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const data = await api.post('/api/live-sessions', {
        title,
        description: document.getElementById('sess-desc').value.trim() || undefined,
        scheduled_at: new Date(scheduled_at).toISOString(),
        duration_minutes: parseInt(document.getElementById('sess-duration').value) || 60,
        max_participants: parseInt(document.getElementById('sess-max').value) || 50,
        meeting_url: document.getElementById('sess-url').value.trim() || undefined,
        course_id: document.getElementById('sess-course').value ? parseInt(document.getElementById('sess-course').value) : undefined
      });
      toast('Session scheduled!', 'success');
      closeScheduleModal();
      loadSessions();
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Create Session';
    }
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);
gsap.from('.page-header, .stat-card, .card, .list-item, .section-block', {
  y: 24, opacity: 0, duration: 0.65, stagger: 0.07, ease: 'power3.out', delay: 0.1
});
gsap.utils.toArray('.card, .list-item, tr').forEach(el => {
  gsap.from(el, { scrollTrigger: { trigger: el, start: 'top 90%' },
    y: 14, opacity: 0, duration: 0.45, ease: 'power2.out' });
});
</script>
</body>
</html>
