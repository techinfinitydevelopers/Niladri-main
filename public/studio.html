<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio — The Foundation Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/archive.css">
  <style>
    :root {
      --bg: #080706;
      --bg-2: #0F0D0B;
      --bg-card: #161412;
      --bg-elevated: #1E1B17;
      --bg-hover: #252119;
      --gold: #C8A84B;
      --gold-bright: #E8C96E;
      --gold-dim: #7A6530;
      --gold-glow: rgba(200,168,75,0.12);
      --text: #F0E6D3;
      --text-2: #B8A898;
      --text-3: #6B5E50;
      --ruby: #8B2E26;
      --emerald: #2D5A27;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); }
    .record-btn {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--ruby); color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 4px solid rgba(200,168,75,0.3);
      transition: all 0.2s; box-shadow: 0 4px 16px rgba(139,46,38,0.4);
      will-change: transform;
    }
    .record-btn:hover { transform: scale(1.07); }
    .record-btn.recording { background: #c0392b; animation: pulse-rec 1.2s infinite; }
    @keyframes pulse-rec { 0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0.5)} 50%{box-shadow:0 0 0 14px rgba(192,57,43,0)} }
    .timer-display {
      font-family: var(--serif); font-size: 40px; font-weight: 600;
      color: var(--text); text-align: center; letter-spacing: 0.06em;
    }
    #waveform-canvas { display: block; width: 100%; height: 96px; border-radius: 4px; }
    /* Override any light theme remnants from archive.css */
    .page-title { color: var(--text) !important; }
    .page-subtitle { color: var(--text-2) !important; }
    .section-title { color: var(--text) !important; }
    .card { background: var(--bg-card) !important; border-color: rgba(200,168,75,0.12) !important; }
    .form-input, .form-textarea { background: var(--bg-elevated) !important; color: var(--text) !important; border-color: rgba(200,168,75,0.2) !important; }
    .form-label { color: var(--text-2) !important; }
    .recording-item { background: var(--bg-card) !important; border-color: rgba(200,168,75,0.12) !important; }
    .modal { background: var(--bg-elevated) !important; border: 1px solid rgba(200,168,75,0.15) !important; }
    .modal-title { color: var(--text) !important; }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-title">The Archive</div>
      <div class="brand-sub">Music School</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/student-dashboard.html" class="nav-item" id="nav-dash">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </a>
      <a href="/course-catalog.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Library
      </a>
      <a href="/my-lessons.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        My Lessons
      </a>
      <a href="/sheet-music.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Sheet Music
      </a>
      <a href="/studio.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        Studio
      </a>
      <a href="/archive-browse.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        Archive
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="handleLogout()">
        <div class="sidebar-avatar" id="sb-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="user-name" id="sb-name">Loading…</div>
          <div class="user-role">Student</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title">Practice Studio</div>
      <div class="topbar-actions">
        <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
        <div class="topbar-avatar" id="topbar-avatar">?</div>
      </div>
    </header>

    <main class="main-content">
      <div class="page-title">Practice Studio</div>
      <p class="page-subtitle">Record, review, and submit your practice sessions.</p>

      <div style="display:grid; grid-template-columns: 1fr 360px; gap:24px; align-items:start;">
        <!-- Recorder -->
        <div>
          <div class="card" style="background: #1A1208; padding:32px;">
            <!-- Waveform canvas -->
            <div style="margin-bottom:24px;">
              <canvas id="waveform-canvas"></canvas>
            </div>

            <!-- Timer -->
            <div class="timer-display" id="timer-display">00:00</div>

            <!-- Controls -->
            <div style="display:flex; align-items:center; justify-content:center; gap:24px; margin-top:20px;">
              <!-- Stop/Reset -->
              <button id="btn-stop" style="width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.1); color:#fff; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;" onclick="stopRecording()" title="Stop">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
              </button>

              <!-- Record -->
              <button class="record-btn" id="btn-record" onclick="toggleRecord()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
              </button>

              <!-- Play -->
              <button id="btn-play" style="width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.1); color:#fff; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;" onclick="playRecording()" title="Play">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </button>
            </div>
            <div style="text-align:center; margin-top:12px; font-size:12px; color:rgba(255,255,255,0.35); letter-spacing:0.08em;" id="rec-status">READY TO RECORD</div>
          </div>

          <!-- Save form -->
          <div class="card mt-20" id="save-form" style="display:none;">
            <div class="card-label">Save Recording</div>
            <div class="form-group">
              <label class="form-label">Title</label>
              <input class="form-input" id="rec-title" placeholder="e.g. Bach Suite No.1 - Prelude run-through">
            </div>
            <div class="form-group">
              <label class="form-label">Notes</label>
              <textarea class="form-textarea" id="rec-notes" placeholder="What did you work on? What needs improvement?" rows="3"></textarea>
            </div>
            <div style="display:flex; gap:10px;">
              <button class="btn btn-primary" onclick="saveRecording()">Save to Archive</button>
              <button class="btn btn-ghost" onclick="discardRecording()">Discard</button>
            </div>
          </div>
        </div>

        <!-- Past Recordings -->
        <div>
          <div class="section-header mb-16">
            <div class="section-title">Past Recordings</div>
          </div>
          <div id="recordings-list">
            <div class="card skeleton" style="height:80px; margin-bottom:8px;"></div>
            <div class="card skeleton" style="height:80px; margin-bottom:8px;"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Submit Modal -->
<div class="modal-overlay" id="submit-modal" style="display:none;">
  <div class="modal">
    <div class="modal-title">Submit to Instructor</div>
    <input type="hidden" id="submit-recording-id">
    <div class="form-group">
      <label class="form-label">Notes for Instructor</label>
      <textarea class="form-textarea" id="submit-notes" placeholder="Any specific areas you'd like feedback on?"></textarea>
    </div>
    <div style="display:flex; gap:12px;">
      <button class="btn btn-primary" style="flex:1;" onclick="submitRecording()">Submit</button>
      <button class="btn btn-ghost" onclick="document.getElementById('submit-modal').style.display='none'">Cancel</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth-guard.js"></script>
<script>
  gsap.registerPlugin(ScrollTrigger);

  // ─── PAGE ENTRANCE ───
  window.addEventListener('DOMContentLoaded', () => {
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.from('#sidebar', { x: -20, opacity: 0, duration: 0.5 }, 0);
    tl.from('.topbar', { y: -10, opacity: 0, duration: 0.45 }, 0.1);
    tl.from('.page-title, .page-subtitle', { opacity: 0, y: 14, duration: 0.4, stagger: 0.08 }, 0.25);
    tl.from('.card', { opacity: 0, y: 20, duration: 0.45, stagger: 0.1 }, 0.4);
  });

  let isRecording = false;
  let mediaRecorder = null;
  let audioChunks = [];
  let audioBlob = null;
  let audioUrl = null;
  let audioPlayer = null;
  let timerInterval = null;
  let startTime = 0;
  let elapsedSeconds = 0;
  let analyser = null;
  let animationId = null;
  let audioContext = null;

  const canvas = document.getElementById('waveform-canvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawIdle() {
    resizeCanvas();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(244,235,208,0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const mid = canvas.height / 2;
    ctx.beginPath();
    ctx.moveTo(0, mid);
    for (let x = 0; x < canvas.width; x++) {
      ctx.lineTo(x, mid + Math.sin(x * 0.04 + Date.now() * 0.001) * 3);
    }
    ctx.strokeStyle = 'rgba(244,235,208,0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();
    animationId = requestAnimationFrame(drawIdle);
  }

  function drawWaveform() {
    if (!analyser) return;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    analyser.getByteFrequencyData(dataArray);

    resizeCanvas();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(244,235,208,0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const barWidth = (canvas.width / bufferLength) * 2.5;
    let x = 0;
    for (let i = 0; i < bufferLength; i++) {
      const barHeight = (dataArray[i] / 255) * canvas.height;
      const hue = 5 + (dataArray[i] / 255) * 20;
      ctx.fillStyle = `hsla(${hue}, 60%, ${45 + (dataArray[i] / 255) * 20}%, 0.9)`;
      ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
      x += barWidth + 1;
    }
    animationId = requestAnimationFrame(drawWaveform);
  }

  drawIdle();

  function formatTime(secs) {
    const m = Math.floor(secs / 60).toString().padStart(2, '0');
    const s = (secs % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  async function toggleRecord() {
    if (isRecording) {
      // Pause not stop - user clicks stop to finalize
      stopRecording();
    } else {
      await startRecording();
    }
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaStreamSource(stream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);

      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        audioUrl = URL.createObjectURL(audioBlob);
        document.getElementById('save-form').style.display = 'block';
      };
      mediaRecorder.start();
      isRecording = true;
      startTime = Date.now() - elapsedSeconds * 1000;
      timerInterval = setInterval(() => {
        elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('timer-display').textContent = formatTime(elapsedSeconds);
      }, 500);

      document.getElementById('btn-record').classList.add('recording');
      document.getElementById('rec-status').textContent = '● RECORDING';
      document.getElementById('rec-status').style.color = 'rgba(255,80,80,0.8)';

      if (animationId) cancelAnimationFrame(animationId);
      drawWaveform();
    } catch (err) {
      toast('Microphone access denied: ' + err.message, 'error');
    }
  }

  function stopRecording() {
    if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    isRecording = false;
    clearInterval(timerInterval);
    document.getElementById('btn-record').classList.remove('recording');
    document.getElementById('rec-status').textContent = 'STOPPED — REVIEW & SAVE';
    document.getElementById('rec-status').style.color = 'rgba(209,161,78,0.8)';
    if (animationId) cancelAnimationFrame(animationId);
    drawIdle();
  }

  function playRecording() {
    if (!audioUrl) { toast('No recording to play', 'error'); return; }
    if (audioPlayer) { audioPlayer.pause(); audioPlayer = null; }
    audioPlayer = new Audio(audioUrl);
    audioPlayer.play();
    document.getElementById('rec-status').textContent = '▶ PLAYING BACK…';
    document.getElementById('rec-status').style.color = 'rgba(255,255,255,0.5)';
    audioPlayer.onended = () => { document.getElementById('rec-status').textContent = 'PLAYBACK COMPLETE'; };
  }

  async function saveRecording() {
    if (!audioBlob) { toast('No recording available', 'error'); return; }
    const title = document.getElementById('rec-title').value || 'Untitled Recording';
    const notes = document.getElementById('rec-notes').value;
    const fd = new FormData();
    fd.append('audio', audioBlob, 'recording.webm');
    fd.append('title', title);
    fd.append('notes', notes);
    fd.append('duration_seconds', elapsedSeconds);
    try {
      await api.upload('/api/recordings', fd);
      toast('Recording saved!');
      document.getElementById('save-form').style.display = 'none';
      document.getElementById('rec-title').value = '';
      document.getElementById('rec-notes').value = '';
      elapsedSeconds = 0;
      document.getElementById('timer-display').textContent = '00:00';
      audioBlob = null; audioUrl = null;
      document.getElementById('rec-status').textContent = 'READY TO RECORD';
      document.getElementById('rec-status').style.color = 'rgba(255,255,255,0.35)';
      loadRecordings();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  function discardRecording() {
    audioBlob = null; audioUrl = null; audioChunks = [];
    elapsedSeconds = 0;
    document.getElementById('timer-display').textContent = '00:00';
    document.getElementById('save-form').style.display = 'none';
    document.getElementById('rec-status').textContent = 'READY TO RECORD';
    document.getElementById('rec-status').style.color = 'rgba(255,255,255,0.35)';
  }

  async function loadRecordings() {
    const list = document.getElementById('recordings-list');
    try {
      const data = await api.get('/api/recordings/me');
      const recs = data.recordings || [];
      if (!recs.length) {
        list.innerHTML = '<div class="card card-sm"><p style="font-size:13px; color:var(--text-light); text-align:center; padding:10px;">No recordings yet. Hit record to get started!</p></div>';
        return;
      }
      list.innerHTML = recs.map(r => `
        <div class="recording-item">
          <div style="width:40px; height:40px; background:rgba(139,46,38,0.10); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--crimson); flex-shrink:0;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
          </div>
          <div style="flex:1; min-width:0;">
            <div style="font-weight:600; font-size:13px; color:var(--text-dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${r.title || 'Untitled'}</div>
            <div style="font-size:11px; color:var(--text-light); margin-top:2px;">
              ${r.duration_seconds ? formatTime(r.duration_seconds) : '—'} · ${new Date(r.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short' })}
            </div>
          </div>
          <div style="display:flex; gap:6px; flex-shrink:0;">
            ${r.file_path ? `<a href="${r.file_path}" target="_blank" class="icon-btn" style="color:var(--forest);" title="Download"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></a>` : ''}
            <button class="btn btn-primary btn-sm" onclick="openSubmitModal(${r.id})">Submit</button>
            <button class="icon-btn" style="color:var(--crimson);" onclick="deleteRecording(${r.id})" title="Delete">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </div>
        </div>
      `).join('');
    } catch (err) {
      list.innerHTML = `<div class="card card-sm"><p style="font-size:13px; color:var(--text-light);">${err.message}</p></div>`;
    }
  }

  function openSubmitModal(recId) {
    document.getElementById('submit-recording-id').value = recId;
    document.getElementById('submit-notes').value = '';
    document.getElementById('submit-modal').style.display = 'flex';
  }

  async function submitRecording() {
    const recId = document.getElementById('submit-recording-id').value;
    const notes = document.getElementById('submit-notes').value;
    try {
      await api.post('/api/submissions', { recording_id: recId, notes });
      document.getElementById('submit-modal').style.display = 'none';
      toast('Submitted to instructor!');
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  async function deleteRecording(id) {
    if (!confirm('Delete this recording?')) return;
    try {
      await api.del(`/api/recordings/${id}`);
      toast('Recording deleted');
      loadRecordings();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  function toast(msg, type = 'success') {
    const tc = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type === 'error' ? 'error' : ''}`;
    t.textContent = msg;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function handleLogout() {
    localStorage.removeItem('archive_token');
    localStorage.removeItem('archive_user');
    window.location.href = '/index.html';
  }

  document.addEventListener('userLoaded', (e) => {
    const user = e.detail;
    document.getElementById('sb-avatar').textContent = user.avatar_initials || '?';
    document.getElementById('sb-name').textContent = user.first_name + ' ' + user.last_name;
    document.getElementById('topbar-avatar').textContent = user.avatar_initials || '?';
    document.getElementById('nav-dash').href = user.role === 'instructor' ? '/instructor-dashboard.html' : '/student-dashboard.html';
    loadRecordings();
  });
</script>
</body>
</html>
